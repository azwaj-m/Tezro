<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tezro Wallet | Payments</title>
    <link rel="stylesheet" href="../../styles/global.css">
    <style>
        :root {
            --neon: #00ff66;
            --danger: #ff4444;
            --card-bg: rgba(20, 20, 20, 0.9);
        }

        body {
            background-color: #000;
            color: white;
            padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Balance Card with Glassmorphism */
        .balance-card {
            width: 100%; max-width: 400px;
            background: var(--card-bg);
            border: 2px solid var(--neon);
            border-radius: 25px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.15);
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        .balance-amount { font-size: 3.5rem; font-weight: 800; color: var(--neon); margin: 5px 0; letter-spacing: -1px; }
        .currency { font-size: 1.2rem; color: #fff; vertical-align: middle; margin-right: 5px; }
        
        #statusTag { 
            display: inline-block; padding: 5px 15px; border-radius: 50px; 
            font-size: 12px; font-weight: bold; margin-top: 10px;
            text-transform: uppercase; border: 1px solid;
        }

        /* Alert Box */
        .blocked-msg {
            width: 100%; max-width: 400px;
            background: rgba(255, 68, 68, 0.1);
            color: var(--danger);
            padding: 15px; border-radius: 15px;
            margin: 20px 0; border: 1px solid var(--danger);
            font-size: 13px; text-align: center; display: none;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Payment Grid */
        .method-grid { width: 100%; max-width: 400px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        
        .payment-box {
            background: #111; border: 1px solid #222; border-radius: 15px;
            padding: 15px; text-align: center; cursor: pointer; transition: 0.3s;
        }

        .payment-box img { width: 50px; height: 50px; object-fit: contain; margin-bottom: 10px; filter: grayscale(1); transition: 0.3s; }
        .payment-box.active { border-color: var(--neon); background: rgba(0, 255, 102, 0.05); }
        .payment-box.active img { filter: grayscale(0); }

        /* Transactions */
        .history-list { width: 100%; max-width: 400px; margin-top: 30px; }
        .history-item {
            background: #0a0a0a; margin-bottom: 8px; padding: 15px;
            border-radius: 12px; display: flex; justify-content: space-between;
            align-items: center; border-left: 3px solid #333;
        }
    </style>
</head>
<body>

    <div style="width: 100%; max-width: 400px;">
        <a href="../../index.html" style="color: var(--neon); text-decoration: none; font-weight: bold;">← TEZRO HOME</a>
    </div>

    <div class="balance-card" id="mainCard">
        <div style="font-size: 12px; color: #888; text-transform: uppercase;">Tezro Digital Wallet</div>
        <div class="balance-amount">
            <span class="currency">PKR</span><span id="wallet-balance">0</span>
        </div>
        <div id="statusTag">Authenticating...</div>
    </div>

    <div id="blockedAlert" class="blocked-msg">
        ⚠️ **توجہ فرمائیں:** آپ کا بیلنس کم ہے۔ نئی رائیڈز لینے کے لیے اکاؤنٹ ری چارج کریں۔
    </div>

    <div style="width: 100%; max-width: 400px; margin-top: 25px;">
        <h3 style="font-size: 16px; margin-bottom: 15px;">TOP-UP WALLET</h3>
        <div class="method-grid">
            <div class="payment-box" id="ep-box" onclick="selectMethod('EasyPaisa')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/be/Easypaisa_logo.png" alt="EP">
                <div style="font-size: 12px;">EasyPaisa</div>
            </div>
            <div class="payment-box" id="jc-box" onclick="selectMethod('JazzCash')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/0e/JazzCash_logo.png" alt="JC">
                <div style="font-size: 12px;">JazzCash</div>
            </div>
        </div>
        <button class="btn" id="rechargeBtn" style="width: 100%; margin-top: 20px;" onclick="addMoney()">ری چارج کریں</button>
    </div>

    <div class="history-list">
        <h3 style="font-size: 16px;">RECENT TRANSACTIONS</h3>
        <div id="transactionContainer">
            <div class="history-item" style="color: #666; justify-content: center; font-size: 12px;">No recent history</div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from '../firebase-config.js';
        import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let currentMethod = "";

        // 1. Auth Listener & Real-time Sync
        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = doc(db, "users", user.uid);
                onSnapshot(userRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        updateWalletUI(data.walletBalance || 0, data.role || 'rider', data.isBlocked);
                    }
                });
            } else {
                window.location.href = "Login.html";
            }
        });

        // 2. UI Update Logic
        function updateWalletUI(balance, role, isBlockedManually) {
            const balanceElem = document.getElementById('wallet-balance');
            const statusTag = document.getElementById('statusTag');
            const blockedAlert = document.getElementById('blockedAlert');
            const mainCard = document.getElementById('mainCard');

            balanceElem.innerText = balance.toLocaleString();

            // Check if account should be visually "Blocked"
            const isBalanceLow = (role === 'driver' && balance <= 0);
            
            if (isBalanceLow || isBlockedManually) {
                statusTag.innerText = "Suspended / بلاک";
                statusTag.style.color = "var(--danger)";
                statusTag.style.borderColor = "var(--danger)";
                blockedAlert.style.display = "block";
                mainCard.style.borderColor = "var(--danger)";
                balanceElem.style.color = "var(--danger)";
            } else {
                statusTag.innerText = "Active / فعال";
                statusTag.style.color = "var(--neon)";
                statusTag.style.borderColor = "var(--neon)";
                blockedAlert.style.display = "none";
                mainCard.style.borderColor = "var(--neon)";
                balanceElem.style.color = "var(--neon)";
            }
        }

        // 3. Payment Interaction
        window.selectMethod = (method) => {
            currentMethod = method;
            document.getElementById('ep-box').classList.toggle('active', method === 'EasyPaisa');
            document.getElementById('jc-box').classList.toggle('active', method === 'JazzCash');
        };

        window.addMoney = () => {
            if (!currentMethod) {
                alert("پہلے ادائیگی کا طریقہ منتخب کریں۔");
                return;
            }
            const amount = prompt(`کتنی رقم جمع کرنا چاہتے ہیں؟ (کم از کم 100)`);
            if (amount >= 100) {
                alert(`${currentMethod} ادائیگی کا عمل شروع ہو رہا ہے...`);
                // یہاں آپ اپنی پیمنٹ گیٹ وے لنک ڈال سکتے ہیں
            } else {
                alert("کم از کم رقم 100 ہونی چاہیے۔");
            }
        };
    </script>
</body>
</html>
