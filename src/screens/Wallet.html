<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AlinGo Wallet | Payments</title>
    <link rel="stylesheet" href="../../global.css">
    <style>
        :root {
            --neon: #39FF14;
            --dark-bg: #000;
            --card-bg: #111;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Balance Card */
        .balance-card {
            width: 100%; max-width: 400px;
            background: linear-gradient(135deg, #111 0%, #050505 100%);
            border: 1px solid var(--neon);
            border-radius: 25px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.2);
            margin-bottom: 30px;
        }

        .balance-label { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .balance-amount { font-size: 3rem; font-weight: bold; color: var(--neon); margin: 10px 0; }
        .currency { font-size: 1.2rem; color: white; }

        /* Payment Methods */
        .section-title { width: 100%; max-width: 400px; font-size: 18px; margin-bottom: 15px; font-weight: bold; }

        .payment-option {
            width: 100%; max-width: 400px;
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 15px;
            padding: 15px;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .payment-option:active { transform: scale(0.98); border-color: var(--neon); }

        .method-info { display: flex; align-items: center; gap: 15px; }
        .method-icon { width: 40px; height: 40px; border-radius: 8px; object-fit: contain; }

        .add-funds-btn {
            width: 100%; max-width: 400px;
            background: var(--neon);
            color: black;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 20px;
            box-shadow: 0 0 15px var(--neon);
            cursor: pointer;
        }

        /* History Section */
        .history-list { width: 100%; max-width: 400px; margin-top: 30px; }
        .history-item {
            display: flex; justify-content: space-between;
            padding: 12px 0; border-bottom: 1px solid #222;
            font-size: 14px;
        }
        .status-plus { color: var(--neon); }
        .status-minus { color: #ff4444; }

        .back-btn { align-self: flex-start; color: var(--neon); text-decoration: none; margin-bottom: 20px; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

    <a href="../../index.html" class="back-btn">⬅ Back to Home</a>

    <div class="balance-card">
        <div class="balance-label">AlinGo Credits</div>
        <div class="balance-amount"><span class="currency">Rs.</span> <span id="wallet-balance">0.00</span></div>
        <p style="font-size: 12px; color: #555;">Top up to enjoy seamless rides</p>
    </div>

    <div class="section-title">Top Up Method</div>

    <div class="payment-option" onclick="selectMethod('EasyPaisa')">
        <div class="method-info">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/be/Easypaisa_logo.png" class="method-icon" alt="EasyPaisa">
            <span>EasyPaisa</span>
        </div>
        <div style="color: var(--neon);">●</div>
    </div>

    <div class="payment-option" onclick="selectMethod('JazzCash')">
        <div class="method-info">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/0e/JazzCash_logo.png" class="method-icon" alt="JazzCash">
            <span>JazzCash</span>
        </div>
        <div style="color: #444;">○</div>
    </div>

    <button class="add-funds-btn" onclick="addMoney()">Add Money</button>

    <div class="history-list">
        <div class="section-title">Recent Transactions</div>
        <div class="history-item">
            <div>Ride to Gulgasht Colony</div>
            <div class="status-minus">- Rs. 150</div>
        </div>
        <div class="history-item">
            <div>Top up via EasyPaisa</div>
            <div class="status-plus">+ Rs. 500</div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from '../firebase-config.js';
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Load Balance from Firestore
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const userRef = doc(db, "users", user.uid);
                const snap = await getDoc(userRef);
                if (snap.exists()) {
                    document.getElementById('wallet-balance').innerText = snap.data().walletBalance || "0.00";
                }
            }
        });

        window.selectMethod = (method) => {
            alert(method + " selected as payment method.");
        };

        window.addMoney = () => {
            const amount = prompt("Enter amount to add (Min: Rs. 100):");
            if (amount && amount >= 100) {
                alert("Redirecting to Secure Payment Gateway...");
                // یہاں آپ اپنی ادائیگی کی API جوڑ سکتے ہیں
            }
        };
    </script>
</body>
</html>
