<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Activity | AlinGo</title>
    <link rel="stylesheet" href="../../global.css">
    <style>
        :root {
            --neon: #39FF14;
            --dark-card: #111;
        }

        body {
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 20px;
        }

        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .back-btn { color: var(--neon); text-decoration: none; font-size: 24px; }

        /* Tabs for Rides & Food */
        .tabs {
            display: flex; background: var(--dark-card);
            border-radius: 12px; padding: 5px; margin-bottom: 20px;
        }
        .tab {
            flex: 1; text-align: center; padding: 10px;
            border-radius: 8px; font-size: 14px; cursor: pointer;
        }
        .tab.active { background: var(--neon); color: #000; font-weight: bold; }

        /* Ride Card */
        .ride-card {
            background: var(--dark-card);
            border: 1px solid #222;
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ride-info { display: flex; gap: 15px; align-items: center; }
        .ride-icon {
            width: 45px; height: 45px;
            background: #1a1a1a;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
        }

        .ride-details h4 { margin: 0; font-size: 15px; }
        .ride-details p { margin: 4px 0 0; font-size: 12px; color: #777; }
        
        .ride-price { text-align: right; }
        .price { font-weight: bold; color: var(--neon); display: block; }
        .status { font-size: 10px; color: #555; text-transform: uppercase; }

        .no-activity {
            text-align: center; margin-top: 50px; color: #444;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="../../index.html" class="back-btn">⬅</a>
        <h2 style="margin:0;">My Activity</h2>
    </div>

    <div class="tabs">
        <div class="tab active">Rides</div>
        <div class="tab" onclick="alert('Food history coming soon')">Food</div>
    </div>

    <div id="activity-container">
        <div class="ride-card">
            <div class="ride-info">
                <div class="ride-icon">🚗</div>
                <div class="ride-details">
                    <h4>Gulgasht to Cantt</h4>
                    <p>Feb 18 • 02:30 PM</p>
                </div>
            </div>
            <div class="ride-price">
                <span class="price">Rs. 320</span>
                <span class="status">Completed</span>
            </div>
        </div>

        <div class="ride-card">
            <div class="ride-info">
                <div class="ride-icon">🏍️</div>
                <div class="ride-details">
                    <h4>Bosan Road</h4>
                    <p>Feb 15 • 10:15 AM</p>
                </div>
            </div>
            <div class="ride-price">
                <span class="price">Rs. 110</span>
                <span class="status">Completed</span>
            </div>
        </div>

        <div class="ride-card" style="opacity: 0.6;">
            <div class="ride-info">
                <div class="ride-icon">📦</div>
                <div class="ride-details">
                    <h4>Courier Delivery</h4>
                    <p>Feb 10 • 08:45 PM</p>
                </div>
            </div>
            <div class="ride-price">
                <span class="price" style="color:#777;">Rs. 0</span>
                <span class="status" style="color:red;">Cancelled</span>
            </div>
        </div>
    </div>

    <div class="no-activity" style="display:none;">
        <i style="font-size: 50px;">📄</i>
        <p>No rides yet. Start your journey with AlinGo!</p>
    </div>

    <script type="module">
        import { auth, db } from '../firebase-config.js';
        import { collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase سے اصلی ڈیٹا لانے کے لیے لاجک
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                // یہاں آپ Firestore سے 'rides' کلیکشن میں سے اس یوزر کی رائیڈز فلٹر کر سکتے ہیں
                console.log("Fetching rides for:", user.uid);
                // ابھی کے لیے یہ اسٹیٹک ڈیٹا دکھا رہا ہے
            }
        });
    </script>
</body>
</html>
