<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Rides | AlinGo</title>
    <link rel="stylesheet" href="../global.css">
    <style>
        .ride-history-card { background: #111; border: 1px solid #222; border-radius: 15px; padding: 15px; margin-bottom: 10px; border-left: 4px solid var(--neon); }
        .ride-history-card span { display: block; font-size: 12px; color: #888; }
        .ride-history-card strong { color: #fff; font-size: 16px; }
    </style>
</head>
<body style="background:#000; color:#fff; padding:20px;">
    <h2 style="color:var(--neon)">My Ride History</h2>
    <div id="history-container">
        <div class="ride-history-card">
            <span>Feb 18, 2026 • 10:30 PM</span>
            <strong>City Ride (Bike)</strong>
            <p>Rs. 150 - Completed</p>
        </div>
    </div>
</body>
</html>
