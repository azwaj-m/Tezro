<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tezro - Live Tracking</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="../../styles/global.css">
    <style>
        :root { --neon-green: #00ff66; }
        body { background-color: #000; color: white; margin: 0; font-family: sans-serif; }
        
        .app-shell { display: flex; flex-direction: column; height: 100vh; }

        #map-container { 
            flex: 1;
            margin: 15px; 
            border-radius: 20px; 
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
            z-index: 1;
        }

        .info-bar {
            display: flex; justify-content: space-around;
            padding: 20px; background: rgba(15, 15, 15, 0.95);
            border-radius: 25px 25px 0 0; border-top: 1px solid #222;
        }

        .price-tag { color: var(--neon-green); font-size: 1.8rem; font-weight: bold; }
        
        .btn-container { padding: 0 20px 20px; background: #0f0f0f; }

        .glow-button {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            background: #ff0000; color: white; font-weight: bold; font-size: 16px;
            cursor: pointer; box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
            transition: 0.3s;
        }

        .glow-button:disabled { background: #444; box-shadow: none; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="app-shell">
        <header class="navbar" style="padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222;">
            <button onclick="location.href='HomeScreen.html'" style="background:none; border:1px solid var(--neon-green); color:var(--neon-green); padding:5px 15px; border-radius:10px; cursor:pointer;">← BACK</button>
            <h2 style="color:var(--neon-green); margin:0; font-size:1.2rem;">LIVE TRACKING</h2>
            <div id="status-indicator" style="color: #00ff66; font-size: 12px; animation: pulse 2s infinite;">● LIVE</div>
        </header>

        <div id="map-container"></div>

        <div class="info-bar">
            <div style="text-align:center;"><small style="color:#666;">فاصلہ</small><br><strong id="dist-val">3.5 KM</strong></div>
            <div class="price-tag">Rs. <span id="fare-amount">500</span></div>
            <div style="text-align:center;"><small style="color:#666;">وقت</small><br><strong id="time-val">08 MIN</strong></div>
        </div>

        <div class="btn-container">
            <button id="stopRideBtn" class="glow-button">
                FINISH RIDE (رائیڈ مکمل کریں)
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script type="module">
        // دو بار ../ کا مطلب ہے دو فولڈر پیچھے جانا (screens سے نکل کر src میں، اور پھر مین روٹ پر)
     import { processRideCommission } from '../../RideComplete.js'; 
     import { auth } from '../firebase-config.js'; // اگر یہ src کے اندر ہے تو ایک ہی بار ../ آئے گا

        
        // 1. میپ انیشلائزیشن
        var map = L.map('map-container', {zoomControl: false}).setView([30.1575, 71.5249], 15);
        
        // ڈارک موڈ میپ لیئر
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© Tezro Maps'
        }).addTo(map);

        // گاڑی کا آئیکن (سرکل)
        var car = L.circle([30.1575, 71.5249], {
            radius: 35, 
            color: '#00ff66', 
            fillColor: '#00ff66', 
            fillOpacity: 1
        }).addTo(map);

        // فرضی موومنٹ (Simulation)
        let moveInterval = setInterval(() => {
            var c = car.getLatLng();
            var newLat = c.lat + 0.00005;
            var newLng = c.lng + 0.00005;
            car.setLatLng([newLat, newLng]);
            map.panTo([newLat, newLng]);
        }, 2000);

        // 2. رائیڈ ختم کرنے کا مین فنکشن
        const stopBtn = document.getElementById('stopRideBtn');

        stopBtn.addEventListener('click', async () => {
            const fare = 500; 

            if (!confirm("کیا آپ رائیڈ مکمل کر کے کمیشن کاٹنا چاہتے ہیں؟")) return;

            stopBtn.disabled = true;
            stopBtn.innerText = "Processing Payment...";

            // چیک کریں کہ یوزر لاگ ان ہے
            const user = auth.currentUser;

            if (user) {
                try {
                    // کمیشن پروسیس کریں
                    const result = await processRideCommission(user.uid, fare);

                    if (result.success) {
                        clearInterval(moveInterval); // حرکت روک دیں
                        alert(`✅ کامیابی! ${result.deducted} روپے کمیشن کاٹ لیا گیا ہے۔`);
                        window.location.replace("Wallet.html"); // ری پلیس تاکہ واپس نہ آ سکے
                    } else {
                        alert("Error: " + result.error);
                        stopBtn.disabled = false;
                        stopBtn.innerText = "FINISH RIDE";
                    }
                } catch (error) {
                    console.error("Critical Error:", error);
                    alert("سسٹم میں خرابی آئی ہے۔ دوبارہ کوشش کریں۔");
                    stopBtn.disabled = false;
                    stopBtn.innerText = "FINISH RIDE";
                }
            } else {
                alert("سیشن ختم ہو چکا ہے۔ دوبارہ لاگ ان کریں۔");
                window.location.href = "Login.html";
            }
        });
    </script>

    <style>
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</body>
</html>
