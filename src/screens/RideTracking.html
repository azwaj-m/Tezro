<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tezro - Live Tracking</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="../../styles/global.css">
    <style>
        #map-container { 
            height: 400px; 
            margin: 15px; 
            border-radius: 20px; 
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
        }
        .info-bar {
            display: flex; justify-content: space-around;
            padding: 20px; background: rgba(10, 10, 10, 0.9);
            border-radius: 20px; margin: 15px;
            border: 1px solid #222;
        }
        .price-tag { color: var(--neon-green); font-size: 1.5rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="app-shell">
        <header class="navbar">
            <button class="glow-button" onclick="location.href='index.html'">← BACK</button>
            <h2 style="color:var(--neon-green)">TRACKING</h2>
            <div id="status-indicator" style="color: #00ff66; font-size: 12px;">● LIVE</div>
        </header>

        <div id="map-container"></div>

        <div class="info-bar">
            <div><small>فاصلہ</small><br><strong>3.5 KM</strong></div>
            <div class="price-tag">Rs. <span id="fare-amount">500</span></div>
            <div><small>وقت</small><br><strong>08 MIN</strong></div>
        </div>

        <div style="padding: 0 15px;">
            <button id="stopRideBtn" class="glow-button" style="width:100%; background:#ff0000; border-color:#ff0000; box-shadow: 0 0 15px #ff0000;">
                FINISH RIDE (رائیڈ مکمل کریں)
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script type="module">
        // ہم اپنی بنائی ہوئی Commission فائل کو یہاں امپورٹ کر رہے ہیں
        import { processRideCommission } from '../RideComplete.js';
        import { auth } from '../firebase-config.js';

        // 1. میپ سیٹ اپ
        var map = L.map('map-container', {zoomControl: false}).setView([30.1575, 71.5249], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        var car = L.circle([30.1575, 71.5249], {radius: 40, color: '#00ff66', fillColor: '#00ff66', fillOpacity: 1}).addTo(map);

        // گاڑی کی فرضی حرکت
        setInterval(() => {
            var c = car.getLatLng();
            car.setLatLng([c.lat + 0.0001, c.lng + 0.0001]);
            map.panTo(car.getLatLng());
        }, 2000);

        // 2. رائیڈ ختم کرنے اور کمیشن کاٹنے کی لاجک
        document.getElementById('stopRideBtn').addEventListener('click', async () => {
            const btn = document.getElementById('stopRideBtn');
            const fare = 500; // فرض کریں کرایہ 500 ہے (آپ اسے ڈائنامک بھی کر سکتے ہیں)
            
            if (confirm("کیا آپ رائیڈ مکمل کر کے کمیشن کاٹنا چاہتے ہیں؟")) {
                btn.disabled = true;
                btn.innerText = "Processing Payment...";

                try {
                    const user = auth.currentUser;
                    if (!user) throw new Error("صارف لاگ ان نہیں ہے۔");

                    // کمیشن کاٹنے والے فنکشن کو کال کرنا
                    const result = await processRideCommission(user.uid, fare);

                    if (result.success) {
                        alert(`✅ رائیڈ مکمل! ${result.deducted} روپے کمیشن کاٹ لیا گیا۔`);
                        window.location.href = "Wallet.html"; // والٹ چیک کرنے کے لیے ری ڈائریکٹ
                    } else {
                        alert("خرابی: " + result.error);
                        btn.disabled = false;
                        btn.innerText = "FINISH RIDE";
                    }
                } catch (error) {
                    alert("ایرر: " + error.message);
                    btn.disabled = false;
                }
            }
        });
    </script>
</body>
</html>
