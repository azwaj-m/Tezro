<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlinGo Admin | Control Center</title>
    <style>
        :root { --neon: #39FF14; --danger: #ff4444; --bg: #050505; --card: #111; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: #0a0a0a; height: 100vh; border-right: 1px solid #222; padding: 20px; position: fixed; }
        .nav-link { padding: 12px; color: #888; cursor: pointer; border-radius: 8px; transition: 0.3s; margin-top: 5px; display: block; text-decoration: none; }
        .nav-link.active { background: var(--neon); color: black; font-weight: bold; }

        /* Main Content */
        .main { margin-left: 280px; padding: 30px; width: calc(100% - 280px); }
        .section-box { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #222; margin-bottom: 30px; }
        
        /* Settings Grid */
        .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .setting-item { display: flex; flex-direction: column; gap: 10px; }
        .setting-item label { color: var(--neon); font-size: 14px; }
        .setting-item input { background: #000; border: 1px solid #333; color: white; padding: 10px; border-radius: 8px; font-size: 16px; }

        /* Buttons & Table */
        .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-green { background: var(--neon); color: black; }
        .btn-save { width: 100%; margin-top: 20px; box-shadow: 0 0 15px rgba(57, 255, 20, 0.2); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #1a1a1a; color: var(--neon); padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="color: var(--neon);">AlinGo Admin</h2>
        <a class="nav-link active" onclick="showSection('dashboard')">Dashboard</a>
        <a class="nav-link" onclick="showSection('settings')">Global Settings</a>
        <a class="nav-link" style="color: #ff4444; margin-top: 50px;">Logout</a>
    </div>

    <div class="main">
        <div id="dashboardSection">
            <h1>Dashboard Overview</h1>
            <div class="section-box">
                <h3>Flagged Drivers (کم بیلنس والے)</h3>
                <table>
                    <thead>
                        <tr>
                            <th>ڈرائیور نام</th>
                            <th>بیلنس</th>
                            <th>ایکشن</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>احمد خان (D-102)</td>
                            <td style="color: var(--danger);">Rs. -150.00</td>
                            <td><button class="btn btn-green" onclick="addCreditPrompt('D-102', 'احمد خان')">Add Balance</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="settingsSection" style="display: none;">
            <h1>Global App Settings</h1>
            <p style="color: #888; margin-bottom: 20px;">یہاں سے آپ پوری ایپ کے رولز کنٹرول کر سکتے ہیں۔</p>
            
            <div class="section-box">
                <div class="settings-grid">
                    <div class="setting-item">
                        <label>Company Commission (%)</label>
                        <input type="number" id="configCommission" placeholder="مثلاً: 10">
                    </div>
                    <div class="setting-item">
                        <label>Driver Block Limit (Rs.)</label>
                        <input type="number" id="configBlockLimit" placeholder="مثلاً: -100">
                    </div>
                    <div class="setting-item">
                        <label>Minimum Recharge Amount (Rs.)</label>
                        <input type="number" id="configMinRecharge" placeholder="مثلاً: 200">
                    </div>
                </div>
                <button class="btn btn-green btn-save" onclick="saveGlobalSettings()">Save Changes (سیٹنگ محفوظ کریں)</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from '../firebase-config.js';
        import { doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Section Toggling Logic
        window.showSection = (section) => {
            document.getElementById('dashboardSection').style.display = (section === 'dashboard') ? 'block' : 'none';
            document.getElementById('settingsSection').style.display = (section === 'settings') ? 'block' : 'none';
            
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
                if(link.innerText.toLowerCase().includes(section)) link.classList.add('active');
            });
        };

        // 1. Load Global Settings from Firestore
        async function loadSettings() {
            const configRef = doc(db, "system", "appConfig");
            const snap = await getDoc(configRef);
            if (snap.exists()) {
                const data = snap.data();
                document.getElementById('configCommission').value = data.commissionRate || 10;
                document.getElementById('configBlockLimit').value = data.blockLimit || -50;
                document.getElementById('configMinRecharge').value = data.minRecharge || 100;
            }
        }

        // 2. Save Global Settings
        window.saveGlobalSettings = async () => {
            const comm = document.getElementById('configCommission').value;
            const limit = document.getElementById('configBlockLimit').value;
            const minRec = document.getElementById('configMinRecharge').value;

            try {
                const configRef = doc(db, "system", "appConfig");
                await updateDoc(configRef, {
                    commissionRate: parseFloat(comm),
                    blockLimit: parseFloat(limit),
                    minRecharge: parseFloat(minRec)
                });
                alert("سیٹنگز کامیابی سے اپڈیٹ کر دی گئی ہیں!");
            } catch (e) {
                alert("خرابی: سیٹنگز محفوظ نہیں ہو سکیں۔");
            }
        };

        // 3. Add Credit Logic
        window.addCreditPrompt = async (driverId, driverName) => {
            let amount = prompt(`${driverName} کے والٹ میں رقم درج کریں:`);
            if (amount && !isNaN(amount)) {
                const driverRef = doc(db, "users", driverId);
                await updateDoc(driverRef, { walletBalance: increment(parseFloat(amount)) });
                alert("رقم جمع کر دی گئی!");
                location.reload();
            }
        };

        loadSettings();
    </script>
</body>
</html>
