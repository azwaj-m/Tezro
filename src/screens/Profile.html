<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlinGo | رائیڈر پروفائل</title>
    <link rel="stylesheet" href="../global.css">
    <style>
        :root {
            --neon: #39FF14;
            --dark-surface: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* مین اپ گریڈڈ کارڈ */
        .profile-card {
            background: var(--dark-surface);
            border: 1px solid rgba(57, 255, 20, 0.2);
            border-radius: 30px;
            padding: 30px 20px;
            text-align: center;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 15px rgba(57, 255, 20, 0.1);
            backdrop-filter: blur(10px);
        }

        .user-info img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--neon);
            padding: 5px;
            margin-bottom: 15px;
            box-shadow: 0 0 20px var(--neon);
            background: #111;
        }

        #user-name {
            font-size: 1.5rem;
            margin: 10px 0;
            font-weight: bold;
        }

        .badge {
            background: var(--neon);
            color: #000;
            padding: 4px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 900;
        }

        /* والیٹ سیکشن */
        .wallet-section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 20px;
            margin: 25px 0;
            border-bottom: 3px solid var(--neon);
        }

        .wallet-section small {
            color: #888;
            font-size: 0.8rem;
            display: block;
        }

        #user-credits {
            font-size: 2.2rem;
            color: var(--neon);
            margin: 10px 0;
            font-weight: 800;
        }

        .add-credit-btn {
            background: transparent;
            border: 1px solid var(--neon);
            color: var(--neon);
            padding: 8px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .add-credit-btn:hover {
            background: var(--neon);
            color: #000;
        }

        /* اسٹیٹس گرڈ */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stat {
            background: var(--glass);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat small {
            display: block;
            color: #666;
            margin-bottom: 5px;
            font-size: 0.75rem;
        }

        .stat strong {
            font-size: 1.1rem;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="profile-card neon-box">
        <div class="user-info">
            <img src="https://ui-avatars.com/api/?name=Rider&background=39FF14&color=000" id="user-img" alt="Profile">
            <h3 id="user-name">لوڈنگ...</h3>
            <span class="badge" id="user-role">رائیڈر</span>
        </div>

        <div class="wallet-section">
            <small>دستیاب کریڈٹ</small>
            <h2 id="user-credits">Rs. 0.00</h2>
            <button class="add-credit-btn" onclick="alert('Top-up coming soon')">Top Up</button>
        </div>

        <div class="stats-grid">
            <div class="stat">
                <small>کل رائیڈز</small>
                <strong id="total-rides">0</strong>
            </div>
            <div class="stat">
                <small>ریٹنگ</small>
                <strong id="user-rating">5.0 ⭐</strong>
            </div>
        </div>
    </div>

    <script type="module">
        // Firebase سے کنکشن (فائل کا رستہ چیک کر لیں)
        import { db, auth } from '../firebase-config.js';

        // پیج لوڈ ہوتے ہی چیک کریں کہ یوزر لاگ ان ہے
        auth.onAuthStateChanged(user => {
            if (user) {
                loadRiderProfile(user.uid);
            } else {
                console.log("صارف لاگ ان نہیں ہے");
                // یہاں آپ Login.html پر ری ڈائریکٹ کر سکتے ہیں
            }
        });

        // رائیڈر کا ڈیٹا حاصل کرنا
        async function loadRiderProfile(userId) {
            try {
                const userDoc = await db.collection('users').doc(userId).get();
                if (userDoc.exists) {
                    const data = userDoc.data();

                    document.getElementById('user-name').innerText = data.name || "نام معلوم نہیں";
                    document.getElementById('user-credits').innerText = `Rs. ${data.wallet || "0.00"}`;
                    document.getElementById('user-role').innerText = data.role || "Rider";
                    document.getElementById('total-rides').innerText = data.completedOrders || "0";
                    
                    if(data.profilePic) {
                        document.getElementById('user-img').src = data.profilePic;
                    }
                }
            } catch (error) {
                console.error("ڈیٹا لوڈ کرنے میں خرابی:", error);
            }
        }

        // رائیڈ مکمل ہونے پر کریڈٹ اپڈیٹ (اگر ضرورت ہو)
        window.completeRide = function(ridePrice) {
            let commission = ridePrice * 0.10;
            let earnings = ridePrice - commission;
            
            // یہ فنکشن آپ کے ڈیٹا بیس اپڈیٹ سسٹم کو کال کرے گا
            alert(`شاندار! آپ نے Rs. ${earnings} کما لیے ہیں۔`);
        }
    </script>
</body>
</html>
