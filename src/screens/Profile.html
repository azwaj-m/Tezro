<div class="profile-card neon-box">
    <div class="user-info">
        <img src="avatar.png" id="user-img">
        <h3 id="user-name">Loading...</h3>
        <span class="badge" id="user-role">Rider</span> </div>

    <div class="wallet-section">
        <small>Available Credits</small>
        <h2 id="user-credits">Rs. 0.00</h2>
        <button class="add-credit-btn">Top Up</button>
    </div>

    <div class="stats-grid">
        <div class="stat">
            <small>Rides Done</small>
            <strong id="total-rides">0</strong>
        </div>
        <div class="stat">
            <small>Rating</small>
            <strong id="user-rating">5.0 ⭐</strong>
        </div>
    </div>
</div>
