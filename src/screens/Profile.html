<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlinGo | Rider Profile</title>
    <link rel="stylesheet" href="../global.css">
    <style>
        :root {
            --neon: #39FF14;
            --dark-card: rgba(10, 10, 10, 0.9);
            --glass-border: rgba(57, 255, 20, 0.3);
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .profile-card {
            background: var(--dark-card);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(57, 255, 20, 0.1);
            backdrop-filter: blur(15px);
            width: 100%;
            max-width: 380px;
            margin: 20px;
        }

        /* یوزر انفو */
        .user-info img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--neon);
            padding: 5px;
            box-shadow: 0 0 20px var(--neon);
            object-fit: cover;
            background: #111;
        }

        #user-name {
            font-size: 1.6rem;
            margin: 15px 0 5px;
            font-weight: 700;
        }

        .badge {
            background: var(--neon);
            color: #000;
            padding: 4px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 900;
            text-transform: uppercase;
        }

        /* والیٹ ڈیزائن */
        .wallet-section {
            background: linear-gradient(145deg, #111, #1a1a1a);
            border-radius: 25px;
            padding: 25px 15px;
            margin: 30px 0;
            border-bottom: 4px solid var(--neon);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .wallet-section small {
            color: #888;
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #user-credits {
            font-size: 2.2rem;
            color: var(--neon);
            margin: 10px 0;
            font-weight: 900;
        }

        .add-credit-btn {
            background: transparent;
            border: 1px solid var(--neon);
            color: var(--neon);
            padding: 10px 25px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .add-credit-btn:hover {
            background: var(--neon);
            color: #000;
            box-shadow: 0 0 15px var(--neon);
        }

        /* اسٹیٹس گرڈ */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 20px;
        }

        .stat small {
            display: block;
            color: #666;
            font-size: 0.7rem;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .stat strong {
            font-size: 1.1rem;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="profile-card neon-box">
        <div class="user-info">
            <img src="https://ui-avatars.com/api/?name=User&background=39FF14&color=000" id="user-img">
            <h3 id="user-name">لوڈنگ...</h3>
            <span class="badge" id="user-role">Rider</span>
        </div>

        <div class="wallet-section">
            <small>دستیاب کریڈٹ</small>
            <h2 id="user-credits">Rs. 0.00</h2>
            <button class="add-credit-btn">Top Up</button>
        </div>

        <div class="stats-grid">
            <div class="stat">
                <small>مکمل رائیڈز</small>
                <strong id="total-rides">0</strong>
            </div>
            <div class="stat">
                <small>ریٹنگ</small>
                <strong id="user-rating">5.0 ⭐</strong>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, auth } from '../firebase-config.js';

        // صارف کے لاگ ان ہوتے ہی ڈیٹا لوڈ کریں
        auth.onAuthStateChanged(user => {
            if (user) {
                loadRiderProfile(user.uid);
            } else {
                window.location.href = 'Login.html'; // اگر لاگ ان نہیں تو واپس بھیجیں
            }
        });

        async function loadRiderProfile(userId) {
            try {
                const userDoc = await db.collection('users').doc(userId).get();
                if (userDoc.exists) {
                    const data = userDoc.data();

                    // UI کو ڈیٹا کے ساتھ اپڈیٹ کرنا
                    document.getElementById('user-name').innerText = data.name || "نام معلوم نہیں";
                    document.getElementById('user-credits').innerText = `Rs. ${data.wallet || "0.00"}`;
                    document.getElementById('user-role').innerText = data.role || "Rider";
                    document.getElementById('total-rides').innerText = data.completedOrders || "0";
                    
                    // اگر صارف کی تصویر موجود ہے تو اسے تبدیل کریں
                    if(data.profilePic) {
                        document.getElementById('user-img').src = data.profilePic;
                    }
                }
            } catch (error) {
                console.error("ڈیٹا لوڈ کرنے میں غلطی:", error);
            }
        }

        // رائیڈ مکمل ہونے کا فنکشن (گلوبل بنا دیا تاکہ بٹن سے کال ہو سکے)
        window.completeRide = function(ridePrice) {
            let commission = ridePrice * 0.10;
            let earnings = ridePrice - commission;
            
            // ڈیٹا بیس اپڈیٹ کال
            updateWallet(auth.currentUser.uid, earnings);
            alert(`شاندار! آپ نے Rs. ${earnings} کما لیے ہیں۔`);
        }
    </script>
</body>
</html>
