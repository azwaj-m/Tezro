<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlinGo | رائیڈر پروفائل</title>
    <link rel="stylesheet" href="../global.css">

    <style>
        :root {
            --neon: #39FF14;
            --dark-surface: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
        }

        .profile-card {
            background: var(--dark-surface);
            border: 1px solid rgba(57,255,20,0.2);
            border-radius: 30px;
            padding: 30px 20px;
            text-align: center;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 0 20px rgba(57,255,20,0.2);
        }

        .user-info img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--neon);
            box-shadow: 0 0 20px var(--neon);
        }

        #user-credits {
            font-size: 2rem;
            color: var(--neon);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="profile-card">
    <div class="user-info">
        <img id="user-img" src="https://ui-avatars.com/api/?name=Rider&background=39FF14&color=000">
        <h3 id="user-name">لوڈنگ...</h3>
        <span id="user-role">رائیڈر</span>
    </div>

    <h2 id="user-credits">Rs. 0.00</h2>
    <p>کل رائیڈز: <strong id="total-rides">0</strong></p>
</div>


<!-- Firebase CDN (No NPM) -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";


// 🔥 اپنی Firebase config یہاں ڈالیں
const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_BUCKET",
    messagingSenderId: "YOUR_ID",
    appId: "YOUR_APP_ID"
};


// Initialize
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


// یوزر لاگ ان چیک کریں
onAuthStateChanged(auth, async (user) => {
    if (user) {
        loadRiderProfile(user.uid);
    } else {
        alert("براہ کرم پہلے لاگ ان کریں");
        window.location.href = "/login.html";
    }
});


// پروفائل لوڈ
async function loadRiderProfile(userId) {
    try {
        const docRef = doc(db, "users", userId);
        const userDoc = await getDoc(docRef);

        if (userDoc.exists()) {
            const data = userDoc.data();

            document.getElementById("user-name").innerText = data.name || "نام موجود نہیں";
            document.getElementById("user-credits").innerText = `Rs. ${data.wallet || 0}`;
            document.getElementById("user-role").innerText = data.role || "Rider";
            document.getElementById("total-rides").innerText = data.completedOrders || 0;

            if (data.profilePic) {
                document.getElementById("user-img").src = data.profilePic;
            }
        }

    } catch (error) {
        console.error("خرابی:", error);
    }
}

</script>

</body>
</html>
