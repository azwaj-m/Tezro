<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tezro | Home</title>
    <link rel="stylesheet" href="../../styles/global.css">
    <style>
        :root { --neon: #00ff66; --bg-dark: #000; }
        body { background: var(--bg-dark); color: white; margin: 0; font-family: 'Segoe UI', sans-serif; }

        /* Header Animation */
        .navbar {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #222; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000;
        }

        .home-scroll { padding: 20px; padding-bottom: 100px; }

        /* Promo Card */
        .promo-slider {
            width: 100%; height: 160px; border-radius: 20px;
            background: linear-gradient(45deg, #00ff66, #006622);
            margin-bottom: 25px; display: flex; align-items: center;
            padding: 20px; box-sizing: border-box; position: relative;
            overflow: hidden;
        }

        .promo-slider::after {
            content: ''; position: absolute; right: -20px; top: -20px;
            width: 100px; height: 100px; background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        /* Search Box - Modern UI */
        .booking-card {
            background: #111; border: 1px solid #222; border-radius: 25px;
            padding: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            margin-bottom: 25px;
        }

        .location-input {
            display: flex; align-items: center; background: #000;
            border: 1px solid #333; border-radius: 15px;
            padding: 12px 15px; margin-bottom: 12px; transition: 0.3s;
        }

        .location-input:focus-within { border-color: var(--neon); box-shadow: 0 0 10px rgba(0,255,102,0.1); }

        .dot-pickup { height: 10px; width: 10px; background: var(--neon); border-radius: 50%; margin-right: 15px; }
        .dot-dest { height: 10px; width: 10px; background: #ff4444; border-radius: 50%; margin-right: 15px; }

        input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 15px; }

        /* Category Grid */
        .category-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px;
        }

        .cat-item { text-align: center; cursor: pointer; }
        .cat-icon {
            background: #111; height: 60px; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; border: 1px solid #222; transition: 0.3s;
            margin-bottom: 8px;
        }

        .cat-item:hover .cat-icon { border-color: var(--neon); transform: translateY(-5px); }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: #0a0a0a;
            display: flex; justify-content: space-around; padding: 15px 0;
            border-top: 1px solid #222; z-index: 1000;
        }

        .nav-link { color: #666; text-decoration: none; font-size: 12px; text-align: center; cursor: pointer; }
        .nav-link.active { color: var(--neon); }
    </style>
</head>
<body>

    <header class="navbar">
        <div style="font-size: 22px; font-weight: 900; letter-spacing: 1px; color: var(--neon);">TEZRO</div>
        <div style="display: flex; gap: 10px;">
            <div id="wallet-btn" onclick="location.href='Wallet.html'" style="background: #111; padding: 8px 15px; border-radius: 50px; border: 1px solid #333; cursor: pointer;">
                <span style="color: var(--neon);">Rs.</span> <span id="header-balance">0</span>
            </div>
        </div>
    </header>

    <div class="home-scroll">
        <div style="margin-bottom: 20px;">
            <h1 style="font-size: 28px; margin: 0;">ہیلو، <span id="userName" style="color: var(--neon);">مسافر</span>!</h1>
            <p style="color: #888; margin-top: 5px;">کدھر کا ارادہ ہے؟</p>
        </div>

        <div class="promo-slider">
            <div>
                <h2 style="margin: 0; color: black; font-size: 24px;">Tezro Discount</h2>
                <p style="margin: 5px 0; color: rgba(0,0,0,0.7); font-weight: bold;">پہلی رائیڈ پر 50% بچت کریں</p>
                <button style="background: black; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-size: 12px; margin-top: 10px;">ابھی بک کریں</button>
            </div>
        </div>

        <div class="booking-card">
            <div class="location-input">
                <div class="dot-pickup"></div>
                <input type="text" id="pickup" placeholder="آپ کی موجودہ جگہ" readonly>
            </div>
            <div class="location-input" style="margin-bottom: 20px;">
                <div class="dot-dest"></div>
                <input type="text" id="destination" placeholder="منزل کہاں ہے؟">
            </div>
            <button class="btn" style="width: 100%; padding: 18px; font-size: 18px;" onclick="searchRide()">رائیڈ تلاش کریں</button>
        </div>

        <h3 style="font-size: 18px; margin-bottom: 15px;">مشہور خدمات</h3>
        <div class="category-grid">
            <div class="cat-item">
                <div class="cat-icon">🏍️</div>
                <span>بائیک</span>
            </div>
            <div class="cat-item">
                <div class="cat-icon">🛺</div>
                <span>رکشہ</span>
            </div>
            <div class="cat-item">
                <div class="cat-icon">🚗</div>
                <span>کار</span>
            </div>
            <div class="cat-item">
                <div class="cat-icon">📦</div>
                <span>ڈیلیوری</span>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-link active" onclick="location.reload()"><div>🏠</div><div>ہوم</div></div>
        <div class="nav-link" onclick="location.href='MyRides.html'"><div>🚗</div><div>رائیڈز</div></div>
        <div class="nav-link" onclick="location.href='Wallet.html'"><div>💳</div><div>والٹ</div></div>
        <div class="nav-link" onclick="location.href='Profile.html'"><div>👤</div><div>پروفائل</div></div>
    </nav>

    <script type="module">
        import { auth, db } from '../firebase-config.js';
        import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 1. ریئل ٹائم ڈیٹا لوڈنگ (نام اور والٹ)
        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = doc(db, "users", user.uid);
                onSnapshot(userRef, (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        document.getElementById('userName').innerText = data.name.split(' ')[0];
                        document.getElementById('header-balance').innerText = (data.walletBalance || 0).toLocaleString();
                    }
                });
            } else {
                window.location.href = "Login.html";
            }
        });

        // 2. فنکشنز کو ونڈو میں ایکسپورٹ کرنا (کراس ختم کرنے کے لیے)
        window.searchRide = () => {
            const dest = document.getElementById('destination').value;
            if (!dest) {
                alert("براہ کرم اپنی منزل درج کریں۔");
                return;
            }
            sessionStorage.setItem("destination", dest);
            window.location.href = "SelectRide.html";
        };
    </script>
</body>
</html>
