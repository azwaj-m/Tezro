<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tezro - Select Ride</title>
    <link rel="stylesheet" href="../styles/global.css">
    <style>
        :root { --neon: #39FF14; }
        body { background: #000; color: white; font-family: sans-serif; margin: 0; }
        .ride-options { padding: 20px; display: grid; gap: 15px; margin-bottom: 20px; }
        .ride-card {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px; background: rgba(255,255,255,0.05); border-radius: 15px;
            border: 1px solid #222; transition: 0.3s; cursor: pointer;
        }
        .ride-card:active { transform: scale(0.95); border-color: var(--neon); }
        .ride-info { display: flex; align-items: center; gap: 15px; }
        .ride-icon { font-size: 2rem; }
        .price { color: var(--neon); font-weight: bold; font-size: 1.1rem; }
        .vvip-tag { background: gold; color: black; font-size: 0.6rem; padding: 2px 5px; border-radius: 5px; font-weight: bold; margin-left: 5px; }
        .back-btn { background: none; border: 1px solid var(--neon); color: var(--neon); padding: 8px 15px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="app-shell">
        <header style="padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #111;">
            <button class="back-btn" onclick="window.location.href='../../index.html'">← BACK</button>
            <h2 style="color:var(--neon); margin:0; font-size: 1.2rem;">SELECT RIDE</h2>
        </header>

        <div class="ride-options">
            <div class="ride-card" onclick="bookRide('Bike', 80)">
                <div class="ride-info">
                    <span class="ride-icon">🏍️</span>
                    <div><strong>Motorcycle</strong><br><small style="color:#777;">Traffic safe</small></div>
                </div>
                <span class="price">Rs. 80</span>
            </div>

            <div class="ride-card" onclick="bookRide('Rickshaw', 150)">
                <div class="ride-info">
                    <span class="ride-icon">🛺</span>
                    <div><strong>Rickshaw</strong><br><small style="color:#777;">Standard</small></div>
                </div>
                <span class="price">Rs. 150</span>
            </div>

            <div class="ride-card" onclick="bookRide('Car', 300)">
                <div class="ride-info">
                    <span class="ride-icon">🚖</span>
                    <div><strong>Car (Mini)</strong><br><small style="color:#777;">AC Ride</small></div>
                </div>
                <span class="price">Rs. 300</span>
            </div>

            <div class="ride-card" style="border-color: gold;" onclick="bookRide('VVIP', 850)">
                <div class="ride-info">
                    <span class="ride-icon">👑</span>
                    <div><strong>VVIP</strong><span class="vvip-tag">GOLD</span><br><small style="color:#777;">Premium</small></div>
                </div>
                <span class="price" style="color: gold;">Rs. 850</span>
            </div>
        </div>
    </div>

    <script>
        // رائیڈ بکنگ لاجک
        function bookRide(type, price) {
            console.log(`Booking ${type}...`);
            // سیشن میں ڈیٹا محفوظ کریں تاکہ RideTracking اور RideComplete اسے استعمال کر سکیں
            sessionStorage.setItem('selectedRideType', type);
            sessionStorage.setItem('currentRideFare', price);
            
            // 404 FIX: رائیڈ ٹریکنگ اسی فولڈر میں ہے، اس لیے راستہ سادہ ہوگا
            window.location.href = 'RideTracking.html';
        }
    </script>
</body>
</html>
