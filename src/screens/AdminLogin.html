<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <title>Tezro Admin - Login</title>
    <style>
        body { background: #000; color: #39FF14; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .admin-box { border: 1px solid #39FF14; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 0 20px rgba(57, 255, 20, 0.2); }
        input { background: #111; border: 1px solid #333; color: #39FF14; padding: 10px; margin: 10px; width: 80%; }
        button { background: #39FF14; color: black; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="admin-box">
        <h2>ADMIN ACCESS</h2>
        <p>صرف مجاز افراد کے لیے</p>
        <input type="password" id="adminPass" placeholder="پاس ورڈ درج کریں">
        <br>
        <button onclick="checkAdmin()">لاگ ان کریں</button>
    </div>

    <script>
        function checkAdmin() {
            const pass = document.getElementById('adminPass').value;
            // آپ یہاں اپنی مرضی کا پاس ورڈ رکھ سکتے ہیں
            if(pass === "Tezro786") {
                // اگر ایڈمن پینل اسی فولڈر میں ہے
                window.location.href = "AdminPanel.html"; 
            } else {
                alert("غلط پاس ورڈ!");
            }
        }
    </script>
</body>
</html>
