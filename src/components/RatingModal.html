<div id="ratingModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div style="background:#111; border:1px solid #39FF14; border-radius:25px; width:100%; max-width:400px; padding:25px; text-align:center; box-shadow: 0 0 30px rgba(57, 255, 20, 0.2);">
        
        <h2 style="color:#39FF14; margin-bottom:5px;">How was your journey?</h2>
        <p style="color:#888; font-size:14px; margin-bottom:20px;">آپ کا سفر کیسا رہا؟</p>

        <div id="starContainer" style="font-size:35px; color:#444; margin-bottom:20px; cursor:pointer;">
            <span onclick="setRating(1)">★</span><span onclick="setRating(2)">★</span><span onclick="setRating(3)">★</span><span onclick="setRating(4)">★</span><span onclick="setRating(5)">★</span>
        </div>

        <div id="feedbackOptions" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;">
            </div>

        <textarea id="commentBox" placeholder="Any additional comments... (اختیاری رائے)" style="width:100%; background:#000; border:1px solid #222; border-radius:10px; color:white; padding:10px; height:60px; font-size:13px; margin-bottom:20px; outline:none;"></textarea>

        <button onclick="submitReview()" style="width:100%; background:#39FF14; color:black; border:none; padding:15px; border-radius:15px; font-weight:bold; font-size:16px; box-shadow: 0 0 15px #39FF14;">SUBMIT REVIEW (جمع کریں)</button>
    </div>
</div>

<script>
    let currentRating = 0;
    let userRole = 'rider'; // یہ آپ کی ایپ کی لاجک سے آئے گا (rider or driver)

    const riderOptions = ["Polite Behavior", "Safe Driving", "Clean Vehicle", "Fair Price"];
    const driverOptions = ["Respectful", "On Time", "Clear Directions", "Cooperative"];

    function showRatingModal(role) {
        userRole = role;
        document.getElementById('ratingModal').style.display = 'flex';
        const optionsDiv = document.getElementById('feedbackOptions');
        optionsDiv.innerHTML = '';
        
        const options = (role === 'rider') ? riderOptions : driverOptions;
        
        options.forEach(opt => {
            let btn = document.createElement('button');
            btn.innerText = opt;
            btn.style = "background:#222; border:1px solid #333; color:#ccc; padding:8px; border-radius:8px; font-size:11px; cursor:pointer;";
            btn.onclick = function() {
                this.style.borderColor = "#39FF14";
                this.style.color = "#39FF14";
            };
            optionsDiv.appendChild(btn);
        });
    }

    function setRating(n) {
        currentRating = n;
        const stars = document.getElementById('starContainer').getElementsByTagName('span');
        for (let i = 0; i < 5; i++) {
            stars[i].style.color = i < n ? "#39FF14" : "#444";
        }
    }

    function submitReview() {
        if(currentRating === 0) {
            alert("Please select a star rating! (برائے کرم ستارے منتخب کریں)");
            return;
        }

        // سخت ایکشن لاجک
        if(currentRating <= 2) {
            alert("Review Submitted. Our safety team will investigate this low rating.\nآپ کی شکایت درج کر لی گئی ہے، ٹیم اس پر غور کرے گی۔");
        } else {
            alert("Thank you for making Tezro a respectful community!");
        }

        document.getElementById('ratingModal').style.display = 'none';
        window.location.href = '/index.html'; // واپس ہوم پر بھیج دیں
    }

    // ٹیسٹ کرنے کے لیے اسے کال کریں:
    // showRatingModal('rider');
</script>
