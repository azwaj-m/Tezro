<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tezro Admin | Access</title>
    <link rel="stylesheet" href="../../styles/global.css">
    <style>
        :root { --neon: #00ff66; --bg: #000; }
        
        .login-container {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; padding: 20px;
        }

        .login-card {
            background: rgba(15, 15, 15, 0.95);
            padding: 30px; border-radius: 20px;
            border: 2px solid var(--neon);
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
            width: 100%; max-width: 350px; text-align: center;
            backdrop-filter: blur(10px);
        }

        .logo-small { height: 60px; margin-bottom: 20px; }

        input {
            width: 100%; padding: 12px; margin: 10px 0;
            background: #000; border: 1px solid #333;
            color: white; border-radius: 8px; box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--neon); }

        .toggle-link {
            font-size: 12px; color: #888; cursor: pointer;
            text-decoration: underline; margin-top: 15px; display: block;
        }

        .error-text { color: #ff4444; font-size: 13px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card" id="loginView">
            <img src="../../assets/logo.png" alt="Tezro" class="logo-small">
            <h2 style="color: var(--neon); margin: 0;">Admin Access</h2>
            <p style="color: #888; font-size: 0.9rem; margin-bottom: 20px;">خفیہ رسائی صرف انتظامیہ کے لیے</p>
            
            <input type="password" id="adminPass" placeholder="ماسٹر پاسورڈ درج کریں">
            
            <button id="loginBtn" onclick="verifyAdmin()" style="width: 100%; margin-top: 10px;">لاگ ان کریں</button>
            <span class="toggle-link" onclick="toggleView(true)">پاسورڈ تبدیل کرنا چاہتے ہیں؟</span>
            <p id="errorMsg" class="error-text"></p>
        </div>

        <div class="login-card" id="changePassView" style="display: none;">
            <h2 style="color: var(--neon);">Change Password</h2>
            <p style="color: #888; font-size: 0.8rem; margin-bottom: 15px;">سیکیورٹی کے لیے موجودہ پاسورڈ ضروری ہے</p>
            
            <input type="password" id="currentPass" placeholder="موجودہ پاسورڈ">
            <input type="password" id="newPass" placeholder="نیا پاسورڈ">
            
            <button id="updateBtn" onclick="updatePassword()" style="width: 100%;">اپ ڈیٹ کریں</button>
            <span class="toggle-link" onclick="toggleView(false)">واپس لاگ ان پر جائیں</span>
        </div>
    </div>

    <script type="module">
        import { db } from '../firebase-config.js';
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firestore ریفرنس
        const adminDocRef = doc(db, "system", "adminConfig");

        // فارم سوئچ کرنے کا فنکشن
        window.toggleView = (isChange) => {
            document.getElementById('loginView').style.display = isChange ? 'none' : 'block';
            document.getElementById('changePassView').style.display = isChange ? 'block' : 'none';
        }

        // لاگ ان کی تصدیق
        window.verifyAdmin = async () => {
            const inputPass = document.getElementById('adminPass').value;
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errorMsg');

            if(!inputPass) return alert("پاسورڈ درج کریں");

            try {
                btn.innerText = "تصدیق ہو رہی ہے...";
                const snap = await getDoc(adminDocRef);

                if (snap.exists() && snap.data().password === inputPass) {
                    sessionStorage.setItem("isAdmin", "true");
                    window.location.href = "../admin/Dashboard.html"; // درست راستہ
                } else {
                    err.innerText = "غلط پاسورڈ! رسائی ممنوع ہے۔";
                    err.style.display = "block";
                }
            } catch (e) {
                console.error(e);
                alert("ڈیٹا بیس سے رابطہ نہیں ہو سکا۔");
            } finally {
                btn.innerText = "لاگ ان کریں";
            }
        }

        // پاسورڈ اپ ڈیٹ کرنے کی لاجک
        window.updatePassword = async () => {
            const curr = document.getElementById('currentPass').value;
            const next = document.getElementById('newPass').value;
            const btn = document.getElementById('updateBtn');

            if(!curr || !next) return alert("تمام خانے پُر کریں");

            try {
                btn.innerText = "تبدیل ہو رہا ہے...";
                const snap = await getDoc(adminDocRef);

                if (snap.exists() && snap.data().password === curr) {
                    if(next.length < 6) return alert("نیا پاسورڈ کم از کم 6 ہندسوں کا ہونا چاہیے۔");
                    
                    await updateDoc(adminDocRef, { password: next });
                    alert("پاسورڈ کامیابی سے تبدیل ہو گیا۔");
                    toggleView(false);
                } else {
                    alert("موجودہ پاسورڈ غلط ہے۔");
                }
            } catch (e) {
                alert("پاسورڈ تبدیل کرنے میں خرابی آئی۔");
            } finally {
                btn.innerText = "اپ ڈیٹ کریں";
            }
        }
    </script>
</body>
</html>
