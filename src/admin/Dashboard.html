<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tezro Dashboard | Admin</title>
    <link rel="stylesheet" href="../../styles/global.css">
    
    <script>
        if (sessionStorage.getItem("isAdmin") !== "true") {
            window.location.replace("../screens/AdminLogin.html");
        }
    </script>

    <style>
        /* آپ کا پرانا اسٹائل برقرار ہے */
        .admin-wrapper { display: flex; min-height: 100vh; visibility: hidden; } /* شروع میں چھپا ہوا */
        .admin-sidebar {
            width: 250px; background: #0a0a0a; border-right: 1px solid #222;
            padding: 20px; display: flex; flex-direction: column; gap: 10px;
        }
        .main-content { flex: 1; padding: 30px; background: #050505; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(0, 255, 102, 0.05); border: 1px solid #1a1a1a; padding: 20px; border-radius: 15px; text-align: center; }
        .stat-card h3 { font-size: 2rem; margin: 10px 0; color: var(--neon-green); }
        .data-table { width: 100%; border-collapse: collapse; background: #0f0f0f; border-radius: 10px; overflow: hidden; margin-top: 20px; }
        .data-table th, .data-table td { padding: 15px; text-align: left; border-bottom: 1px solid #222; }
        .data-table th { background: #111; color: var(--neon-green); }
        .settings-box { background: #111; padding: 20px; border-radius: 15px; border-left: 4px solid var(--neon-green); margin-bottom: 30px; }
        .badge-online { color: #00ff66; font-size: 0.8rem; border: 1px solid #00ff66; padding: 2px 8px; border-radius: 20px; }
        .badge-offline { color: #ff4444; font-size: 0.8rem; border: 1px solid #ff4444; padding: 2px 8px; border-radius: 20px; }
    </style>
</head>
<body>

<div class="admin-wrapper" id="adminContent">
    <nav class="admin-sidebar">
        <h2 style="font-size: 1.5rem; color: var(--neon-green);">TEZRO <span style="color:white">ADMIN</span></h2>
        <hr style="border: 0.5px solid #222; width: 100%;">
        <button onclick="location.reload()">🔄 Refresh Data</button>
        <button onclick="logoutAdmin()" style="border-color: #ff4444; color: #ff4444; margin-top: auto;">🚪 Logout</button>
    </nav>

    <main class="main-content">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Dashboard Overview</h1>
            <div id="admin-status" style="color: var(--neon-green); font-size: 0.9rem;">● Secure Session Active</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <p>Total Revenue</p>
                <h3 id="total-revenue">Rs. 0</h3>
            </div>
            <div class="stat-card">
                <p>Total Rides</p>
                <h3 id="total-rides">0</h3>
            </div>
            <div class="stat-card">
                <p>Active Drivers</p>
                <h3 id="active-drivers">0</h3>
            </div>
        </div>

        <div class="settings-box">
            <h3>Global Settings</h3>
            <div style="display: flex; gap: 15px; align-items: center;">
                <label>Company Commission (%): </label>
                <input type="number" id="commissionInput" style="width: 100px; padding: 8px; background: #000; border: 1px solid #333; color: white;">
                <button onclick="updateCommission()">Save Changes</button>
            </div>
        </div>

        <div class="card">
            <h3>Drivers Management</h3>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Driver Name</th>
                        <th>Status</th>
                        <th>Wallet Balance</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="drivers-list">
                    <tr><td colspan="4" style="text-align:center;">Loading drivers...</td></tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<script type="module">
    import { db } from '../firebase-config.js';
    import { collection, doc, updateDoc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // لاگ آؤٹ فنکشن
    window.logoutAdmin = () => {
        sessionStorage.removeItem("isAdmin");
        window.location.replace("../screens/AdminLogin.html");
    };

    // سیکیورٹی چیک اور ڈیٹا لوڈنگ کا آغاز
    function initDashboard() {
        if (sessionStorage.getItem("isAdmin") === "true") {
            document.getElementById('adminContent').style.visibility = "visible";
            loadDashboardData();
        } else {
            window.location.replace("../screens/AdminLogin.html");
        }
    }

    async function loadDashboardData() {
        // 1. کمیشن ریٹ ریئل ٹائم اپڈیٹ
        onSnapshot(doc(db, "system", "appConfig"), (docSnap) => {
            if(docSnap.exists()) {
                document.getElementById('commissionInput').value = docSnap.data().commission;
            }
        });

        // 2. صرف ڈرائیورز کا ڈیٹا لوڈ کرنا
        const q = query(collection(db, "users"), where("role", "==", "driver"));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('drivers-list');
            list.innerHTML = "";
            let driverCount = 0;

            snapshot.forEach((userDoc) => {
                const data = userDoc.data();
                driverCount++;
                const row = `
                    <tr>
                        <td>${data.name || 'Unknown'}</td>
                        <td><span class="${data.isBlocked ? 'badge-offline' : 'badge-online'}">${data.isBlocked ? 'Blocked' : 'Active'}</span></td>
                        <td>Rs. ${data.walletBalance || 0}</td>
                        <td>
                            <button onclick="toggleBlock('${userDoc.id}', ${data.isBlocked})" 
                                    style="padding: 5px 12px; font-size: 11px; border-color: ${data.isBlocked ? '#00ff66' : '#ff4444'}; color: ${data.isBlocked ? '#00ff66' : '#ff4444'};">
                                ${data.isBlocked ? 'Unblock' : 'Block'}
                            </button>
                        </td>
                    </tr>
                `;
                list.innerHTML += row;
            });
            document.getElementById('active-drivers').innerText = driverCount;
        });
    }

    // بلاک / ان بلاک لاجک
    window.toggleBlock = async (uid, currentStatus) => {
        const action = currentStatus ? "Unblock" : "Block";
        if(confirm(`Are you sure you want to ${action} this driver?`)) {
            try {
                await updateDoc(doc(db, "users", uid), { isBlocked: !currentStatus });
            } catch (e) {
                alert("Error: " + e.message);
            }
        }
    };

    // کمیشن اپڈیٹ کریں
    window.updateCommission = async () => {
        const val = document.getElementById('commissionInput').value;
        if(val < 0 || val > 100) return alert("Please enter valid percentage (0-100)");
        
        try {
            await updateDoc(doc(db, "system", "appConfig"), { commission: parseInt(val) });
            alert("Success: Commission rate updated!");
        } catch (e) {
            alert("Permission Denied: " + e.message);
        }
    };

    // رن فنکشن
    initDashboard();
</script>

</body>
</html>
