<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlinGo | Ride & Food</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="src/global.css">

<style>

:root{
    --neon:#39FF14;
    --dark:#000;
}

body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:sans-serif;
    overflow-x:hidden;
}

/* ===== MAP ===== */

#map-container{
    height:55vh;
    border-radius:25px;
    margin:15px;
    overflow:hidden;
    box-shadow:0 0 30px rgba(57,255,20,0.2);
}

/* ===== Lightning Overlay ===== */

.lightning-line{
    position:absolute;
    width:100%;
    height:100%;
    pointer-events:none;
    background:linear-gradient(90deg, transparent, rgba(57,255,20,0.6), transparent);
    animation:flash 3s infinite linear;
}

@keyframes flash{
    0%{transform:translateX(-100%);}
    100%{transform:translateX(100%);}
}

/* ===== Services ===== */

.main-services{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    padding:20px;
}

.service-card{
    background:rgba(57,255,20,0.05);
    border:2px solid rgba(57,255,20,0.3);
    border-radius:25px;
    padding:35px 10px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 0 20px rgba(57,255,20,0.15);
}

.service-card:hover{
    background:rgba(57,255,20,0.15);
    box-shadow:0 0 30px var(--neon);
}

.service-card i{
    font-size:3rem;
    display:block;
    margin-bottom:15px;
    text-shadow:0 0 15px var(--neon);
}

.service-card span{
    font-weight:bold;
    letter-spacing:1px;
}

/* ===== Action Button ===== */

.action-panel{
    padding:20px;
    text-align:center;
}

.glow-button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:20px;
    background:var(--neon);
    color:#000;
    font-weight:bold;
    font-size:1rem;
    cursor:pointer;
    box-shadow:0 0 25px var(--neon);
}

/* ===== Footer ===== */

.footer-nav{
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    background:#111;
    border-top:1px solid rgba(57,255,20,0.2);
}

.nav-btn{
    text-align:center;
    font-size:0.8rem;
    cursor:pointer;
}

.icon-circle{
    font-size:1.4rem;
    margin-bottom:5px;
}

</style>
</head>
<body>

<!-- MAP -->
<div style="position:relative;">
    <div id="map-container"></div>
    <div class="lightning-line"></div>
</div>

<!-- SERVICES -->
<div class="main-services">
    <div class="service-card" onclick="goToPath('src/screens/SelectRide.html')">
        <i>🚗</i>
        <span>GET A RIDE</span>
    </div>

    <div class="service-card" onclick="alert('Food Service Coming Soon')">
        <i>🍱</i>
        <span>ORDER FOOD</span>
    </div>
</div>

<!-- QUICK BOOK -->
<div class="action-panel">
    <button class="glow-button" onclick="goToPath('src/screens/SelectRide.html')">
        BOOK NOW
    </button>
</div>

<!-- FOOTER -->
<footer class="footer-nav">
    <div class="nav-btn" onclick="location.href='index.html'">
        <div class="icon-circle">🏠</div>
        HOME
    </div>

    <div class="nav-btn" onclick="goToPath('src/screens/SelectRide.html')">
        <div class="icon-circle">🚗</div>
        RIDES
    </div>

    <div class="nav-btn" onclick="goToPath('src/screens/Profile.html')">
        <div class="icon-circle">👤</div>
        PROFILE
    </div>
</footer>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map-container',{zoomControl:false})
.setView([30.1575,71.5249],14);

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
).addTo(map);


// Neon Route Line
var neonRoute = L.polyline([
    [30.1575,71.5249],
    [30.1650,71.5300],
    [30.1700,71.5350]
],{
    color:'#39FF14',
    weight:6,
    opacity:0.8
}).addTo(map);


// 404 Safe Navigation
function goToPath(target){
    const isVercel = window.location.hostname.includes("vercel.app");
    window.location.href = isVercel ? target : "/" + target;
}

</script>

</body>
</html>
