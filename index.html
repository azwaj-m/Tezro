<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tezro | Super App</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="src/styles/global.css">
    <style>
        :root { --neon: #39FF14; --dark-bg: #000; --sidebar-width: 300px; --glass: rgba(255, 255, 255, 0.05); }
        body { background-color: var(--dark-bg); margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; color: white; overflow-x: hidden; }
        .sidebar { position: fixed; top: 0; left: -300px; width: var(--sidebar-width); height: 100%; background: #050505; z-index: 2000; transition: 0.4s; border-right: 1px solid var(--neon); }
        .sidebar.active { left: 0; }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1999; display: none; backdrop-filter: blur(4px); }
        #map-container { height: 35vh; width: 92%; margin: 15px auto; border: 1.5px solid var(--neon); border-radius: 25px; }
        .services-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
        .service-card { background: #0f0f0f; border-radius: 20px; padding: 20px; text-align: center; border: 1px solid rgba(57, 255, 20, 0.1); cursor: pointer; }
        .footer { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #1a1a1a; z-index: 1000; }
        .footer-item { text-align: center; color: #666; font-size: 10px; flex: 1; cursor: pointer; text-decoration: none; }
        .footer-item.active { color: var(--neon); }
    </style>
</head>
<body>

<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

<nav class="sidebar" id="sidebar">
    <div style="padding: 40px 20px 20px; background: linear-gradient(180deg, rgba(57,255,20,0.15), transparent);">
        <img src="https://ui-avatars.com/api/?name=User&background=39FF14&color=000" id="side-user-img" style="width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--neon);">
        <div id="side-user-name" style="font-weight: bold; font-size: 18px; margin-top: 10px;">Loading...</div>
        <div id="side-user-rating" style="color: var(--neon); font-size: 12px;">★ 5.0 Rider</div>
    </div>

    <div style="padding: 10px 0;">
        <a onclick="navigateTo('index.html')" class="menu-item" style="display:block; padding:15px 25px; color:white; text-decoration:none;">🏠 Home</a>
        <a onclick="navigateTo('src/screens/Profile.html')" class="menu-item" style="display:block; padding:15px 25px; color:white; text-decoration:none;">💳 Payments & Wallet</a>
        <a onclick="handleLogout()" class="menu-item" style="display:block; padding:15px 25px; color: #ff4444; text-decoration:none;">🚪 Logout</a>
    </div>
</nav>

<div class="app-shell">
    <header style="padding: 15px; display: flex; align-items: center; justify-content: space-between;">
        <div onclick="toggleSidebar()" style="font-size: 28px; color: var(--neon); cursor: pointer;">☰</div>
        <img src="assets/logo.png" id="adminLogoTrigger" style="height: 35px; cursor: pointer;" onclick="secretAdminTap()" alt="TEZRO">
        <div style="font-size: 24px; cursor: pointer;" onclick="alert('No notifications')">🔔</div>
    </header>

    <div id="map-container"></div>

    <div class="services-grid">
        <div class="service-card" onclick="navigateTo('src/screens/SelectRide.html')">
            <i>🚗</i><br><span>City Ride</span>
        </div>
        <div class="service-card" onclick="alert('Coming soon!')">
            <i>🏍️</i><br><span>Bike</span>
        </div>
        <div class="service-card" onclick="alert('Coming soon!')">
            <i>📦</i><br><span>Delivery</span>
        </div>
        <div class="service-card" onclick="navigateTo('src/screens/SelectRide.html')">
            <i>👑</i><br><span>VVIP</span>
        </div>
    </div>

    <footer class="footer">
        <a onclick="navigateTo('index.html')" class="footer-item active">🏠<br>Home</a>
        <a onclick="navigateTo('src/screens/SelectRide.html')" class="footer-item">🚗<br>Rides</a>
        <a onclick="navigateTo('src/screens/Profile.html')" class="footer-item">👤<br>Account</a>
    </footer>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import { auth, db } from './src/firebase-config.js';
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // --- 404 FIX: Admin Tap Logic ---
    let tapCount = 0;
    let lastTap = 0;
    window.secretAdminTap = () => {
        const currentTime = Date.now();
        if (currentTime - lastTap > 1000) tapCount = 0;
        tapCount++;
        lastTap = currentTime;
        if (tapCount === 10) {
            tapCount = 0;
            // درست راستہ (Path)
            window.location.href = "src/screens/AdminLogin.html"; 
        }
    };

    // --- 404 FIX: Navigation Logic ---
    window.navigateTo = (path) => {
        // Vercel پر 404 سے بچنے کے لیے سلیش ہٹا کر چیک کریں
        window.location.href = path;
    };

    window.toggleSidebar = () => {
        const sb = document.getElementById('sidebar');
        const ov = document.getElementById('overlay');
        sb.classList.toggle('active');
        ov.style.display = sb.classList.contains('active') ? 'block' : 'none';
    };

    window.handleLogout = () => {
        auth.signOut().then(() => {
            window.location.href = "src/screens/Login.html";
        });
    };

    // User Data Loader
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            const docSnap = await getDoc(doc(db, "users", user.uid));
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('side-user-name').innerText = data.name || "Tezro User";
            }
        } else {
            // اگر یوزر لاگ ان نہیں تو لاگ ان پیج پر بھیجیں
            window.location.href = "src/screens/Login.html";
        }
    });

    // Map Init
    var map = L.map('map-container', {zoomControl: false}).setView([30.1575, 71.5249], 14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
</script>
</body>
</html>
