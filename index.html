<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AlinGo | City Ride & Food</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --neon: #39FF14;
            --dark-card: #0f0f0f;
            --neon-glow: 0 0 10px rgba(57, 255, 20, 0.4);
        }

        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* Lightning Effect Background */
        .lightning-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(57, 255, 20, 0.05) 0%, transparent 80%);
            z-index: -1;
        }

        /* Navbar & Logo */
        .navbar {
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .menu-btn { font-size: 24px; color: var(--neon); cursor: pointer; }

        /* Map with Neon Border */
        #map-container {
            height: 38vh;
            width: 90%;
            margin: 10px auto;
            border: 2px solid var(--neon);
            border-radius: 20px;
            box-shadow: var(--neon-glow);
            overflow: hidden;
        }

        /* Main Services Grid */
        .main-services {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 15px;
            margin-bottom: 80px; /* Space for footer */
        }

        .service-card {
            background: var(--dark-card);
            border: 1.5px solid rgba(57, 255, 20, 0.2);
            border-radius: 20px;
            padding: 20px 10px;
            text-align: center;
            box-shadow: var(--neon-glow);
            transition: 0.3s;
        }

        .service-card:active { transform: scale(0.95); border-color: var(--neon); }
        .service-card img { width: 50px; height: auto; margin-bottom: 10px; }
        .service-card span { display: block; font-weight: bold; font-size: 13px; letter-spacing: 1px; }

        /* Bottom Navigation (Fixed Alignment) */
        .footer-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid var(--neon);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .nav-item {
            text-align: center;
            color: #888;
            font-size: 10px;
            flex: 1;
        }

        .nav-item.active { color: var(--neon); }
        .nav-icon {
            font-size: 20px;
            display: block;
            margin-bottom: 2px;
        }

        /* Install App Button */
        .install-pwa {
            background: var(--neon);
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 12px;
            box-shadow: 0 0 15px var(--neon);
            margin: 10px auto;
            display: block;
        }
    </style>
</head>
<body>

<div class="lightning-bg"></div>

<header class="navbar">
    <div class="menu-btn">☰</div>
    <img src="assets/logo.png" alt="AlinGo" style="height: 35px;">
    <div style="width: 24px;"></div> </header>

<div id="map-container"></div>

<button class="install-pwa" id="installApp">INSTALL ALINGO</button>

<div class="main-services">
    <div class="service-card" onclick="location.href='src/screens/SelectRide.html'">
        <img src="https://cdn-icons-png.flaticon.com/512/744/744465.png" alt="Ride">
        <span>CITY RIDE</span>
    </div>
    <div class="service-card" onclick="alert('Coming Soon')">
        <img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png" alt="Food">
        <span>FOOD</span>
    </div>
    <div class="service-card" onclick="alert('Coming Soon')">
        <img src="https://cdn-icons-png.flaticon.com/512/2311/2311514.png" alt="Courier">
        <span>COURIER</span>
    </div>
    <div class="service-card" onclick="location.href='src/screens/Profile.html'">
        <img src="https://cdn-icons-png.flaticon.com/512/633/633611.png" alt="Wallet">
        <span>WALLET</span>
    </div>
</div>

<nav class="footer-nav">
    <div class="nav-item active" onclick="location.href='index.html'">
        <span class="nav-icon">🏠</span>Home
    </div>
    <div class="nav-item" onclick="location.href='src/screens/SelectRide.html'">
        <span class="nav-icon">🚗</span>Rides
    </div>
    <div class="nav-item" onclick="alert('No Orders')">
        <span class="nav-icon">📦</span>Orders
    </div>
    <div class="nav-item" onclick="location.href='src/screens/Profile.html'">
        <span class="nav-icon">👤</span>Account
    </div>
</nav>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Map Initialization
    var map = L.map('map-container', {zoomControl: false}).setView([30.1575, 71.5249], 14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    // Install App Feature
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installApp').style.display = 'block';
    });

    document.getElementById('installApp').addEventListener('click', () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choice) => {
                if (choice.outcome === 'accepted') document.getElementById('installApp').style.display = 'none';
            });
        }
    });
</script>

</body>
</html>
