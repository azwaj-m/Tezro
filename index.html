<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tezro</title>

<style>
:root{
    --primary:#39FF14;
    --bg-dark:#0a0f14;
    --bg-light:#111827;
    --card:#121a22;
    --text:#ffffff;
    --gray:#9ca3af;
}

/* ===== BODY ===== */
body{
    margin:0;
    font-family:system-ui;
    background:linear-gradient(135deg,#0a0f14,#111827);
    color:var(--text);
    padding-bottom:80px;
}

/* ===== HEADER ===== */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
}

.logo{
    font-size:22px;
    font-weight:800;
    color:var(--primary);
    letter-spacing:2px;
    text-shadow:0 0 10px var(--primary);
}

/* ===== SIDEBAR ===== */
.sidebar{
    position:fixed;
    top:0;
    left:-280px;
    width:260px;
    height:100%;
    background:#000;
    transition:.4s;
    z-index:2000;
    border-right:2px solid var(--primary);
}

.sidebar.active{ left:0; }

.sidebar-user{
    padding:40px 20px;
    border-bottom:1px solid #222;
}

.sidebar-item{
    display:block;
    padding:15px 20px;
    color:#ccc;
    text-decoration:none;
    transition:.3s;
}

.sidebar-item:hover{
    background:#111;
    color:var(--primary);
}

/* ===== HERO SECTION ===== */
.hero{
    margin:10px 20px;
    padding:25px;
    border-radius:20px;
    background:linear-gradient(145deg,#111827,#0f172a);
    border:1px solid #1f2937;
    box-shadow:0 0 40px rgba(57,255,20,.08);
}

.hero h2{
    margin:0;
    font-size:20px;
}

.hero p{
    margin:5px 0 0;
    color:var(--gray);
}

/* ===== GRID ===== */
.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
    padding:20px;
}

.card{
    height:140px;
    border-radius:20px;
    background:var(--card);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    transition:.3s;
    border:1px solid #1f2937;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 0 25px rgba(57,255,20,.2);
}

.card span{
    font-size:40px;
}

.card h3{
    margin:8px 0 0;
    font-size:14px;
    font-weight:600;
}

/* ===== HOTEL FULL WIDTH ===== */
.hotel{
    grid-column:span 2;
    height:110px;
}

/* ===== BOTTOM NAV ===== */
.bottom-nav{
    position:fixed;
    bottom:0;
    width:100%;
    height:70px;
    background:#0f172a;
    display:flex;
    justify-content:space-around;
    align-items:center;
    border-top:1px solid #1f2937;
}

.nav-item{
    font-size:12px;
    color:var(--gray);
}

.nav-item.active{
    color:var(--primary);
}
</style>
</head>

<body>

<!-- Sidebar -->
<nav class="sidebar" id="sidebar">
    <div class="sidebar-user">
        <h3>Tezro User</h3>
        <p style="color:var(--primary);font-size:12px;">Super App Access</p>
    </div>

    <a class="sidebar-item" onclick="navigateTo('src/screens/Profile.html')">👤 Profile</a>
    <a class="sidebar-item" onclick="navigateTo('src/screens/Orders.html')">📦 Orders</a>
    <a class="sidebar-item" onclick="navigateTo('src/screens/Wallet.html')">💳 Wallet</a>
    <a class="sidebar-item" onclick="navigateTo('src/screens/Support.html')">🎧 Support</a>
    <a class="sidebar-item" style="color:red;" onclick="handleLogout()">🚪 Logout</a>
</nav>

<!-- Header -->
<div class="header">
    <div onclick="toggleSidebar()" style="font-size:22px;color:var(--primary);cursor:pointer;">☰</div>
    <div class="logo">TEZRO</div>
    <div>🔔</div>
</div>

<!-- Hero Section -->
<div class="hero">
    <h2>All-in-One Super Services</h2>
    <p>Ride • Shopping • Food • Parcel • Hotel Booking</p>
</div>

<!-- Main Grid -->
<div class="grid">

    <div class="card" onclick="navigateTo('src/screens/SelectRide.html')">
        <span>🚗</span>
        <h3>Book Ride</h3>
    </div>

    <div class="card" onclick="navigateTo('src/screens/FoodHome.html')">
        <span>🍔</span>
        <h3>Food Delivery</h3>
    </div>

    <div class="card" onclick="navigateTo('src/screens/ShopHome.html')">
        <span>🛒</span>
        <h3>Online Shopping</h3>
    </div>

    <div class="card" onclick="navigateTo('src/screens/ParcelHome.html')">
        <span>📦</span>
        <h3>Send Parcel</h3>
    </div>

    <div class="card hotel" onclick="navigateTo('src/screens/BookingHome.html')">
        <span>🏨</span>
        <h3>Hotels & Wedding Halls</h3>
    </div>

</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
    <div class="nav-item active">🏠<br>Home</div>
    <div class="nav-item" onclick="navigateTo('src/screens/Orders.html')">📋<br>Activity</div>
    <div class="nav-item" onclick="navigateTo('src/screens/Profile.html')">👤<br>Profile</div>
</nav>

<script>
function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("active");
}

function navigateTo(path){
    window.location.href = path;
}
</script>

</body>
</html>
