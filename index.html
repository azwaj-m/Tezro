<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AlinGo - Super App</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --neon-blue: #00D1FF;
            --dark-blue: rgba(0, 209, 255, 0.2);
            --bg-black: #050505;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg-black);
            font-family: 'Inter', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* Lightning Effect Background */
        .lightning-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #001a33 0%, #000 100%);
            z-index: -2;
        }

        /* Sidebar inDrive Style */
        .sidebar {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: #111; z-index: 10000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 5px 0 20px rgba(0, 209, 255, 0.3);
            border-right: 2px solid var(--neon-blue);
        }
        .sidebar.active { left: 0; }
        
        .sidebar-header { padding: 40px 20px; background: #1a1a1a; border-bottom: 1px solid #333; }
        .user-profile { display: flex; align-items: center; gap: 15px; }
        .user-profile img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--neon-blue); }

        .menu-items { padding: 20px 0; }
        .menu-item { 
            padding: 15px 25px; display: flex; align-items: center; gap: 20px;
            text-decoration: none; color: #ccc; transition: 0.3s;
        }
        .menu-item i { color: var(--neon-blue); font-size: 1.2rem; }
        .menu-item:active { background: var(--dark-blue); color: var(--neon-blue); }

        /* Main Header */
        .navbar {
            padding: 15px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
        }
        .menu-btn { font-size: 1.5rem; color: var(--neon-blue); cursor: pointer; }
        .app-logo { height: 35px; filter: drop-shadow(0 0 8px var(--neon-blue)); }

        /* Map with Lightning Border */
        #map-container {
            height: 45vh; width: 92%; margin: 15px auto;
            border-radius: 25px; border: 2px solid var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue), inset 0 0 15px var(--neon-blue);
            position: relative; overflow: hidden;
        }

        /* Main Services (inDrive Style Grid) */
        .services-container {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            padding: 10px 15px;
        }
        .service-card {
            background: #1a1a1a; border-radius: 20px; padding: 20px;
            text-align: center; border: 1px solid #333; position: relative;
        }
        .service-card i { font-size: 2.5rem; color: var(--neon-blue); margin-bottom: 10px; display: block; }
        .service-card.active { border-color: var(--neon-blue); box-shadow: 0 0 10px var(--dark-blue); }

        /* Three-Quarter Buttons */
        .btn-wrapper { display: flex; justify-content: center; padding: 20px 0; }
        .glow-button {
            width: 75%; padding: 16px; border-radius: 50px;
            background: var(--neon-blue); color: black; font-weight: 800;
            border: none; font-size: 1.1rem; text-transform: uppercase;
            box-shadow: 0 0 20px var(--neon-blue); transition: 0.3s;
        }
        .glow-button:active { transform: scale(0.95); box-shadow: 0 0 5px var(--neon-blue); }

        /* Overlay */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 9999; display: none;
        }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="lightning-bg"></div>
    <div class="overlay" onclick="toggleMenu()"></div>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="user-profile">
                <img src="https://ui-avatars.com/api/?name=User&background=00D1FF&color=000" alt="User">
                <div>
                    <h3 style="margin:0; font-size: 1.1rem;">AlinGo Rider</h3>
                    <small style="color:var(--neon-blue)">View Profile</small>
                </div>
            </div>
        </div>
        <div class="menu-items">
            <a href="#" class="menu-item" onclick="goToPath('src/screens/RideTracking.html')"><i class="fas fa-history"></i> Ride History</a>
            <a href="#" class="menu-item" onclick="goToPath('src/screens/Profile.html')"><i class="fas fa-wallet"></i> AlinGo Wallet</a>
            <a href="#" class="menu-item"><i class="fas fa-percent"></i> Promotions</a>
            <a href="#" class="menu-item"><i class="fas fa-headset"></i> Support</a>
            <a href="#" class="menu-item"><i class="fas fa-cog"></i> Settings</a>
        </div>
    </nav>

    <div class="app-shell">
        <header class="navbar">
            <i class="fas fa-bars menu-btn" onclick="toggleMenu()"></i>
            <img src="assets/logo.png" alt="AlinGo" class="app-logo">
            <div style="width: 24px;"></div> </header>

        <div id="map-container"></div>

        <div class="services-container">
            <div class="service-card active" onclick="selectService('ride')">
                <i class="fas fa-car-side"></i>
                <span style="font-weight:bold">CITY RIDE</span>
            </div>
            <div class="service-card" onclick="alert('Food coming soon')">
                <i class="fas fa-hamburger"></i>
                <span style="font-weight:bold">FOOD DELIVERY</span>
            </div>
        </div>

        <div class="btn-wrapper">
            <button class="glow-button" onclick="goToPath('src/screens/SelectRide.html')">
                FIND A DRIVER
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Map Initialization
        var map = L.map('map-container', {zoomControl: false}).setView([30.1575, 71.5249], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        // Custom Blue Pulse Marker
        var marker = L.circleMarker([30.1575, 71.5249], {
            color: '#00D1FF',
            fillColor: '#00D1FF',
            fillOpacity: 0.5,
            radius: 8
        }).addTo(map);

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.querySelector('.overlay').classList.toggle('active');
        }

        function goToPath(target) {
            const isVercel = window.location.hostname.includes("vercel.app");
            window.location.href = isVercel ? target : "/" + target;
        }

        function selectService(type) {
            // Logic to switch UI if needed
            console.log("Service Selected: " + type);
        }
    </script>
</body>
</html>
