<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tezro | All-in-One Super App</title>
    <style>
        :root {
            --primary: #39FF14; /* Neon Lime */
            --bg-main: #0a0a0a;
            --card-bg: #151515;
            --text-gray: #a0a0a0;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body { 
            background: var(--bg-main); color: white; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            margin: 0; padding-bottom: 80px;
        }

        /* --- Header & Search --- */
        .header { padding: 25px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .search-bar { 
            margin: 15px 20px; background: var(--card-bg); border-radius: 15px; 
            padding: 12px 15px; display: flex; align-items: center; border: 1px solid #222;
        }
        .search-bar input { background: none; border: none; color: white; margin-left: 10px; width: 100%; outline: none; }

        /* --- Sidebar Premium --- */
        .sidebar {
            position: fixed; top: 0; left: -300px; width: 300px; height: 100%;
            background: #000; z-index: 2000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid var(--primary);
        }
        .sidebar.active { left: 0; box-shadow: 20px 0 80px rgba(0,0,0,0.9); }
        .sidebar-user { padding: 50px 25px 20px; border-bottom: 1px solid #1a1a1a; }
        
        .sidebar-menu { padding: 20px 0; }
        .sidebar-item { 
            padding: 15px 25px; display: flex; align-items: center; gap: 15px;
            text-decoration: none; color: #ddd; font-weight: 500; transition: 0.3s;
        }
        .sidebar-item:hover { background: var(--glass); color: var(--primary); }

        /* --- Main Super Categories --- */
        .main-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; 
        }
        .main-card {
            height: 160px; border-radius: 25px; position: relative; overflow: hidden;
            border: 1px solid #222; transition: 0.4s; cursor: pointer;
            display: flex; flex-direction: column; justify-content: flex-end; padding: 15px;
        }
        .main-card:active { transform: scale(0.96); }
        .main-card::before {
            content: ''; position: absolute; inset: 0; 
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); z-index: 1;
        }
        .card-title { position: relative; z-index: 2; font-weight: bold; font-size: 1.1rem; }
        .card-tag { position: relative; z-index: 2; font-size: 0.7rem; color: var(--primary); }
        
        /* Specific Styles for Sections */
        .ride-card { background: url('https://images.unsplash.com/photo-1449965408869-eaa3f722e40d?q=80&w=400') center/cover; }
        .food-card { background: url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=400') center/cover; }
        .shop-card { background: url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?q=80&w=400') center/cover; }
        .parcel-card { background: url('https://images.unsplash.com/photo-1566576721346-d4a3b4eaad5b?q=80&w=400') center/cover; }
        .hotel-card { background: url('https://images.unsplash.com/photo-1566073771259-6a8506099945?q=80&w=400') center/cover; grid-column: span 2; height: 120px; }

        /* --- Bottom Nav --- */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(10,10,10,0.95);
            backdrop-filter: blur(10px); display: flex; justify-content: space-around;
            align-items: center; border-top: 1px solid #222; z-index: 1000;
        }
        .nav-item { text-align: center; font-size: 0.7rem; color: var(--text-gray); cursor: pointer; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-user">
        <div style="width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--primary); background: #111;"></div>
        <h3 style="margin: 15px 0 5px;">Tezro Partner</h3>
        <p style="color: var(--primary); font-size: 0.8rem;">Super User Tier</p>
    </div>
    <div class="sidebar-menu">
        <a class="sidebar-item" onclick="navigateTo('src/screens/Profile.html')">👤 My Account</a>
        <a class="sidebar-item" onclick="navigateTo('src/screens/Orders.html')">📦 Orders & Bookings</a>
        <a class="sidebar-item" onclick="navigateTo('src/screens/Wallet.html')">💳 Wallet & Rewards</a>
        <a class="sidebar-item" onclick="navigateTo('src/screens/Support.html')">🎧 Help Center</a>
        <a class="sidebar-item" style="color: #ff4444;" onclick="handleLogout()">🚪 Logout</a>
    </div>
</nav>

<div class="header">
    <div onclick="toggleSidebar()" style="font-size: 24px; color: var(--primary); cursor: pointer;">☰</div>
    <div onclick="secretAdminTap()" style="font-weight: 900; letter-spacing: 2px; color: var(--primary); font-size: 1.4rem;">TEZRO</div>
    <div style="font-size: 20px;">🔔</div>
</div>

<div class="search-bar">
    <span>🔍</span>
    <input type="text" placeholder="Search Food, Products, Hotels...">
</div>

<div class="main-grid">
    <div class="main-card shop-card" onclick="navigateTo('src/screens/ShopHome.html')">
        <span class="card-tag">SHOPPING</span>
        <span class="card-title">Tezro Mart</span>
    </div>

    <div class="main-card food-card" onclick="navigateTo('src/screens/FoodHome.html')">
        <span class="card-tag">DELIVERY</span>
        <span class="card-title">Food Express</span>
    </div>

    <div class="main-card ride-card" onclick="navigateTo('src/screens/SelectRide.html')">
        <span class="card-tag">MOBILITY</span>
        <span class="card-title">City Ride</span>
    </div>

    <div class="main-card parcel-card" onclick="navigateTo('src/screens/ParcelHome.html')">
        <span class="card-tag">LOGISTICS</span>
        <span class="card-title">Send Parcel</span>
    </div>

    <div class="main-card hotel-card" onclick="navigateTo('src/screens/BookingHome.html')">
        <span class="card-tag">HOSPITALITY</span>
        <span class="card-title">Hotels & Wedding Halls</span>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active">🏠<br>Home</div>
    <div class="nav-item" onclick="navigateTo('src/screens/ShopHome.html')">🛒<br>Shop</div>
    <div class="nav-item" onclick="navigateTo('src/screens/Orders.html')">📋<br>Activity</div>
    <div class="nav-item" onclick="navigateTo('src/screens/Profile.html')">👤<br>Profile</div>
</nav>

<script type="module">
    import { auth, db } from './src/firebase-config.js';
    
    window.toggleSidebar = () => { document.getElementById('sidebar').classList.toggle('active'); };
    window.navigateTo = (path) => { window.location.href = path; };

    // Secret Admin Access
    let taps = 0;
    window.secretAdminTap = () => {
        taps++;
        if(taps === 10) navigateTo('src/screens/AdminLogin.html');
        setTimeout(() => taps = 0, 5000);
    };

    auth.onAuthStateChanged(user => {
        if(!user) navigateTo('src/screens/Login.html');
    });
</script>
</body>
</html>
