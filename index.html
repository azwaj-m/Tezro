<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tezro - Super App</title>
    
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        const errorDiv = document.getElementById('debug-error');
        if (errorDiv) {
          errorDiv.style.display = 'block';
          errorDiv.innerHTML = `<b>Build Error:</b> ${message}<br><small>Line: ${lineno}</small>`;
        }
        return false;
      };
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
      body { 
        margin: 0; 
        padding: 0; 
        background-color: #000508; /* گہرا نیلا/کالا */
        font-family: 'Inter', Arial, sans-serif;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      #root { width: 100%; height: 100%; }

      /* لوڈنگ اینیمیشن */
      .loader-container {
        text-align: center;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #00FF88;
        border-top: 4px solid transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 10px;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

      #debug-error {
        display: none;
        position: fixed;
        bottom: 20px;
        left: 20px;
        right: 20px;
        background: rgba(255, 0, 0, 0.9);
        color: white;
        padding: 15px;
        border-radius: 10px;
        font-size: 12px;
        z-index: 9999;
      }
    </style>
  </head>
  <body>
    
    <div id="root">
      <div class="loader-container" id="initial-loader">
        <div class="spinner"></div>
        <p style="color: #00FF88; letter-spacing: 2px;">TEZRO IS LOADING...</p>
      </div>
    </div>

    <div id="debug-error"></div>
    
    <script type="module" src="/src/main.jsx"></script>

  </body>
</html>
