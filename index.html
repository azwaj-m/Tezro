<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Tezro - Secure Super App</title>
    
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <style>
      :root {
        --tezro-gold: #FFD700;
        --tezro-bg: #000000;
      }

      body { 
        margin: 0; 
        padding: 0; 
        background-color: var(--tezro-bg); 
        font-family: 'Plus Jakarta Sans', sans-serif;
        color: white;
        overflow: hidden; /* ایپ کے اندر اسکرولنگ کنٹرول ہوگی */
        user-select: none; /* سیکیورٹی: ٹیکسٹ کاپی کرنا منع ہے */
        -webkit-tap-highlight-color: transparent;
      }

      #root { width: 100vw; height: 100vh; }

      /* 🚀 PRE-LOADER (بجلی کی طرح تیز) */
      .secure-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 2px solid rgba(255, 215, 0, 0.1);
        border-top: 2px solid var(--tezro-gold);
        border-radius: 50%;
        animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
      }

      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

      #error-shield {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        background: #ff0000;
        color: white;
        text-align: center;
        padding: 10px;
        font-size: 10px;
        z-index: 10000;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    
    <div id="error-shield">SYSTEM ALERT: RENDER ERROR DETECTED</div>

    <div id="root">
      <div class="secure-loader" id="initial-loader">
        <div class="spinner"></div>
        <div style="margin-top: 20px; letter-spacing: 5px; font-weight: 800; color: #FFD700; font-size: 14px;">TEZRO</div>
        <div style="margin-top: 5px; color: #444; font-size: 10px; font-weight: 600;">ENCRYPTED CONNECTION...</div>
      </div>
    </div>

    <script>
      window.onerror = function(msg, url, line) {
        document.getElementById('error-shield').style.display = 'block';
        document.getElementById('error-shield').innerHTML = 'SECURITY LOG: ' + msg + ' at line ' + line;
        return false;
      };
    </script>

    <script type="module" src="/src/main.jsx"></script>

  </body>
</html>
