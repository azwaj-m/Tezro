<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AlinGo | City Services</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="src/global.css">
    <style>
        :root {
            --neon-green: #39FF14;
            --dark-bg: #000000;
            --glass: rgba(255, 255, 255, 0.05);
            --neon-shadow: 0 0 15px rgba(57, 255, 20, 0.4);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--dark-bg);
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
            color: white;
        }

        /* Side Menu Styling (inDrive Style) */
        .side-menu {
            position: fixed;
            top: 0;
            left: -100%;
            width: 80%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 10000;
            transition: 0.4s;
            border-right: 2px solid var(--neon-green);
            padding: 20px;
        }
        .side-menu.active { left: 0; }
        .menu-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none; z-index: 9999;
        }

        .menu-header { border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 20px; }
        .menu-item {
            display: flex; align-items: center; gap: 15px;
            padding: 15px; border-radius: 12px; cursor: pointer;
            transition: 0.3s; margin-bottom: 5px;
        }
        .menu-item:hover { background: var(--glass); color: var(--neon-green); }

        /* App Shell Adjustments */
        .app-shell { position: relative; width: 100%; min-height: 100vh; overflow: hidden; }

        /* Map with Neon Glow */
        #map-container {
            height: 35vh;
            width: 92%;
            margin: 15px auto;
            border-radius: 25px;
            border: 2px solid var(--neon-green);
            box-shadow: var(--neon-shadow);
            z-index: 1;
        }

        /* inDrive Style Services Grid */
        .services-container {
            padding: 0 15px;
            margin-top: -20px;
            z-index: 10;
            position: relative;
        }

        .service-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 12px;
        }

        .service-box {
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid rgba(57, 255, 20, 0.2);
            border-radius: 20px;
            padding: 20px 10px;
            text-align: center;
            box-shadow: var(--neon-shadow);
            width: 90%; /* Three-quarters feel */
            margin: auto;
        }

        .service-box i { font-size: 2.5rem; display: block; margin-bottom: 10px; }
        .service-box span { font-weight: bold; font-size: 0.9rem; color: #fff; }

        /* Floating Install Button */
        .install-btn {
            background: var(--neon-green);
            color: black;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 30px;
            position: fixed;
            bottom: 85px;
            right: 15px;
            z-index: 999;
            box-shadow: 0 0 20px var(--neon-green);
            display: none; /* Shows via JS */
        }

        /* Role Badge */
        .role-badge {
            font-size: 0.7rem;
            background: var(--neon-green);
            color: #000;
            padding: 2px 8px;
            border-radius: 5px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

<div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="side-menu" id="sideMenu">
    <div class="menu-header">
        <h2 style="color:var(--neon-green)">AlinGo</h2>
        <p id="user-display">Guest User <span class="role-badge">RIDER</span></p>
    </div>
    <div class="menu-item" onclick="goToPath('src/screens/Profile.html')">👤 My Profile</div>
    <div class="menu-item" onclick="goToPath('src/screens/SelectRide.html')">🚗 Book a Ride</div>
    <div class="menu-item" onclick="alert('Food Menu Soon')">🍱 Order Food</div>
    <div class="menu-item" onclick="alert('Courier Service Soon')">📦 AlinGo Delivery</div>
    <div class="menu-item" onclick="goToPath('src/screens/Login.html')">🔄 Switch Role (Driver/Courier)</div>
    <hr style="border: 0.5px solid #333; margin: 20px 0;">
    <div class="menu-item">⚙️ Settings</div>
    <div class="menu-item" style="color: #ff4444;">🚪 Logout</div>
</div>

<div class="app-shell">
    <header class="navbar" style="padding: 15px;">
        <div class="menu-trigger" onclick="toggleMenu()" style="cursor: pointer;">
            <div style="width:25px; height:3px; background:var(--neon-green); margin: 5px 0;"></div>
            <div style="width:20px; height:3px; background:var(--neon-green); margin: 5px 0;"></div>
            <div style="width:25px; height:3px; background:var(--neon-green); margin: 5px 0;"></div>
        </div>
        <div class="logo-wrapper">
            <img src="assets/logo.png" alt="AlinGo" class="app-logo" style="height: 40px;">
        </div>
        <div class="profile-icon" onclick="goToPath('src/screens/Profile.html')" style="font-size: 1.5rem; cursor:pointer;">👤</div>
    </header>

    <div id="map-container"></div>

    <div class="services-container">
        <div class="service-row">
            <div class="service-box" onclick="goToPath('src/screens/SelectRide.html')">
                <i>🚗</i>
                <span>CITY RIDE</span>
            </div>
            <div class="service-box" onclick="alert('Food Coming Soon')">
                <i>🍱</i>
                <span>FOOD</span>
            </div>
        </div>
        <div class="service-row">
            <div class="service-box" onclick="alert('Delivery Coming Soon')">
                <i>📦</i>
                <span>COURIER</span>
            </div>
            <div class="service-box" onclick="goToPath('src/screens/Profile.html')">
                <i>💳</i>
                <span>WALLET</span>
            </div>
        </div>
    </div>

    <button class="install-btn" id="installBtn">INSTALL APP</button>

    <footer class="footer-nav" style="border-top: 1px solid var(--neon-green); background: rgba(0,0,0,0.9);">
        <div class="nav-btn active" onclick="location.href='index.html'">🏠<span>Home</span></div>
        <div class="nav-btn" onclick="goToPath('src/screens/SelectRide.html')">🚗<span>Rides</span></div>
        <div class="nav-btn" onclick="alert('No orders')">📦<span>Orders</span></div>
        <div class="nav-btn" onclick="goToPath('src/screens/Profile.html')">👤<span>Account</span></div>
    </footer>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Initialize Map
    var map = L.map('map-container', {zoomControl: false}).setView([30.1575, 71.5249], 14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    // Dynamic Navigation
    function goToPath(target) {
        window.location.href = target;
    }

    // Menu Controls
    function toggleMenu() {
        const menu = document.getElementById('sideMenu');
        const overlay = document.getElementById('overlay');
        menu.classList.toggle('active');
        overlay.style.display = menu.classList.contains('active') ? 'block' : 'none';
    }

    // Role Logic Simulation (For build)
    window.onload = () => {
        const userRole = localStorage.getItem('userRole') || 'RIDER';
        document.querySelector('.role-badge').innerText = userRole;
    };

    // Install App Logic
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBtn').style.display = 'block';
    });

    document.getElementById('installBtn').addEventListener('click', () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choice) => {
                if (choice.outcome === 'accepted') document.getElementById('installBtn').style.display = 'none';
            });
        }
    });
</script>

</body>
</html>
