<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tezro Super App</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
:root{
    --primary:#39FF14;
    --dark:#0a0f14;
    --glass:rgba(255,255,255,0.05);
}

body{
    margin:0;
    font-family:system-ui;
    background:linear-gradient(135deg,#0a0f14,#111827,#0a0f14);
    background-size:400% 400%;
    animation:bgMove 15s infinite alternate;
    color:white;
    overflow-x:hidden;
    padding-bottom:90px;
}

@keyframes bgMove{
    0%{background-position:left;}
    100%{background-position:right;}
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
}

.logo{
    height:40px;
}

.install-btn{
    background:var(--primary);
    border:none;
    padding:8px 15px;
    border-radius:20px;
    font-weight:bold;
    cursor:pointer;
}

/* MAP */
#map{
    height:220px;
    margin:10px 15px;
    border-radius:20px;
    overflow:hidden;
    border:2px solid var(--primary);
    box-shadow:0 0 25px rgba(57,255,20,.3);
}

/* SERVICES GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
    padding:20px;
}

.card{
    background:var(--glass);
    backdrop-filter:blur(15px);
    border:1px solid rgba(57,255,20,.3);
    border-radius:20px;
    height:130px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    transition:.3s;
    cursor:pointer;
}

.card:hover{
    box-shadow:0 0 30px rgba(57,255,20,.6);
    transform:translateY(-5px);
}

.card span{
    font-size:35px;
}

.hotel{
    grid-column:span 2;
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    left:-260px;
    top:0;
    width:250px;
    height:100%;
    background:#000;
    border-right:2px solid var(--primary);
    transition:.4s;
    z-index:2000;
    padding-top:60px;
}

.sidebar.active{left:0;}

.sidebar a{
    display:block;
    padding:15px 20px;
    color:#ccc;
    text-decoration:none;
}

.sidebar a:hover{
    background:#111;
    color:var(--primary);
}

/* BOTTOM NAV */
.bottom-nav{
    position:fixed;
    bottom:0;
    width:100%;
    height:70px;
    background:#0f172a;
    display:flex;
    justify-content:space-around;
    align-items:center;
    border-top:1px solid #222;
}

.bottom-nav div{
    font-size:12px;
    text-align:center;
}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <a href="src/screens/Profile.html">👤 Profile</a>
    <a href="src/screens/Orders.html">📦 Orders</a>
    <a href="src/screens/Wallet.html">💳 Wallet</a>
    <a href="src/screens/Support.html">🎧 Support</a>
</div>

<!-- Header -->
<div class="header">
    <div onclick="toggleSidebar()" style="font-size:22px;color:var(--primary);cursor:pointer;">☰</div>
    <img src="assets/logo.png" class="logo">
    <button class="install-btn" id="installBtn">Install</button>
</div>

<!-- LIVE MAP -->
<div id="map"></div>

<!-- SERVICES -->
<div class="grid">
    <div class="card" onclick="navigateTo('src/screens/SelectRide.html')">
        <span>🚗</span>
        Ride
    </div>

    <div class="card" onclick="navigateTo('src/screens/FoodHome.html')">
        <span>🍔</span>
        Food
    </div>

    <div class="card" onclick="navigateTo('src/screens/ShopHome.html')">
        <span>🛒</span>
        Shop
    </div>

    <div class="card" onclick="navigateTo('src/screens/ParcelHome.html')">
        <span>📦</span>
        Parcel
    </div>

    <div class="card hotel" onclick="navigateTo('src/screens/BookingHome.html')">
        <span>🏨</span>
        Hotels & Halls
    </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
    <div>🏠<br>Home</div>
    <div onclick="navigateTo('src/screens/Orders.html')">📋<br>Activity</div>
    <div onclick="navigateTo('src/screens/Profile.html')">👤<br>Profile</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("active");
}

function navigateTo(path){
    window.location.href = path;
}

/* Leaflet Live Map */
var map = L.map('map').setView([31.5204, 74.3587], 13); // Lahore default
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19,
}).addTo(map);

/* PWA Install */
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
});

document.getElementById('installBtn').addEventListener('click', async () => {
    if(deferredPrompt){
        deferredPrompt.prompt();
    }
});
</script>

</body>
</html>
