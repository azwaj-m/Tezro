<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlinGo | Super App</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="src/global.css">
    
    <style>
        :root {
            --neon: #39FF14;
            --dark-bg: #000000;
            --glass: rgba(255, 255, 255, 0.05);
        }

        /* سائیڈ مینیو (InDrive Style) */
        .side-menu {
            position: fixed;
            top: 0;
            right: -280px; /* شروع میں چھپا ہوا */
            width: 280px;
            height: 100%;
            background: #111;
            z-index: 10000;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            padding: 20px;
            border-left: 1px solid var(--neon);
        }

        .side-menu.active { right: 0; }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            z-index: 9999;
        }

        .menu-overlay.active { display: block; }

        .user-profile-brief {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
            margin-bottom: 20px;
        }

        .user-profile-brief img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--neon);
        }

        .menu-items { list-style: none; padding: 0; }
        .menu-items li {
            padding: 15px 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
            color: #ccc;
        }

        .menu-items li:hover { background: var(--glass); color: var(--neon); }
        .menu-items li i { font-style: normal; font-size: 1.2rem; }

        /* مین ہوم اسکرین */
        #map-container {
            height: 45vh;
            width: 100%;
            border-bottom: 2px solid var(--neon);
        }

        .main-services {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
            margin-top: -30px;
            position: relative;
            z-index: 10;
        }

        .service-card {
            background: #111;
            border: 1px solid var(--glass);
            border-radius: 20px;
            padding: 25px 10px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        .service-card i { font-size: 2.5rem; display: block; margin-bottom: 10px; }
        .service-card span { font-weight: bold; font-size: 0.9rem; color: #fff; }

        /* ٹاپ بار */
        .navbar {
            position: absolute;
            top: 20px;
            width: 90%;
            left: 5%;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-btn {
            background: #000;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            border: 1px solid var(--neon);
        }

        .menu-btn span { width: 20px; height: 2px; background: var(--neon); }

        .admin-panel-hidden { display: none; }
    </style>
</head>
<body>

    <div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="side-menu" id="sideMenu">
        <div class="user-profile-brief" onclick="goToPath('src/screens/Profile.html')">
            <img src="https://ui-avatars.com/api/?name=User&background=39FF14&color=000" id="menu-avatar">
            <div>
                <strong id="menu-user-name">لوڈنگ...</strong><br>
                <small style="color:var(--neon)">پروفائل دیکھیں</small>
            </div>
        </div>
        
        <ul class="menu-items">
            <li onclick="goToPath('src/screens/SelectRide.html')"><i>🚗</i> سواری بک کریں</li>
            <li onclick="alert('جلد آ رہا ہے')"><i>🍱</i> کھانا آرڈر کریں</li>
            <li onclick="goToPath('src/screens/Profile.html')"><i>💰</i> میرا والیٹ</li>
            <li onclick="alert('ہسٹری خالی ہے')"><i>📜</i> میری رائیڈز</li>
            <li onclick="alert('24/7 سپورٹ فعال ہے')"><i>🎧</i> ہیلپ سینٹر</li>
            <li style="margin-top: 50px; color: #ff4444;" onclick="logout()"><i>🚪</i> لاگ آؤٹ</li>
        </ul>
    </div>

    <div class="app-shell">
        <header class="navbar">
            <div class="menu-btn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </div>
            <img src="assets/logo.png" alt="AlinGo" style="height: 40px;" onclick="adminTrigger()">
            <div style="width: 45px;"></div> </header>

        <div id="map-container"></div>

        <div class="main-services">
            <div class="service-card" onclick="goToPath('src/screens/SelectRide.html')">
                <i>🚕</i>
                <span>سواری حاصل کریں</span>
            </div>
            <div class="service-card" onclick="alert('فوڈ مینیو جلد آ رہا ہے')">
                <i>🍕</i>
                <span>کھانا آرڈر کریں</span>
            </div>
        </div>

        <div style="padding: 20px;">
            <div class="admin-stat-card" style="background: var(--glass); padding: 15px; border-radius: 15px; display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 1.5rem;">📍</span>
                <div>
                    <small style="color: #888;">آپ کی لوکیشن</small>
                    <p style="margin:0; font-weight: bold; color: var(--neon);">ملتان، پاکستان</p>
                </div>
            </div>
        </div>

        <footer class="footer-nav">
            <div class="nav-btn active" onclick="location.href='index.html'">
                <div class="icon-circle">🏠</div><span>ہوم</span>
            </div>
            <div class="nav-btn" onclick="goToPath('src/screens/SelectRide.html')">
                <div class="icon-circle">🚕</div><span>سواری</span>
            </div>
            <div class="nav-btn" onclick="goToPath('src/screens/Profile.html')">
                <div class="icon-circle">👤</div><span>پروفائل</span>
            </div>
        </footer>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { auth, db } from './src/firebase-config.js';
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // نقشہ سیٹ اپ
        var map = L.map('map-container', {zoomControl: false, attributionControl: false}).setView([30.1575, 71.5249], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        // یوزر ڈیٹا لوڈ کریں
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    document.getElementById('menu-user-name').innerText = userDoc.data().name;
                }
            } else {
                document.getElementById('menu-user-name').innerText = "مہمان صارف";
            }
        });

        window.logout = () => {
            auth.signOut().then(() => location.reload());
        }
    </script>

    <script>
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function goToPath(target) {
            const isVercel = window.location.hostname.includes("vercel.app");
            window.location.href = isVercel ? target : "/" + target;
        }

        let logoClicks = 0;
        function adminTrigger() {
            logoClicks++;
            if (logoClicks === 5) {
                alert("ایڈمن پینل فعال ہو رہا ہے...");
                logoClicks = 0;
            }
            setTimeout(() => { logoClicks = 0; }, 3000);
        }
    </script>
</body>
</html>
