<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tezro - Super App</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link 
      rel="stylesheet" 
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" 
      crossorigin="" 
    />

    <style>
      body { 
        margin: 0; 
        padding: 0; 
        background-color: #000508; 
        font-family: 'Inter', Arial, sans-serif; /* جدید فانٹ */
        overflow-x: hidden; 
        color: white;
      }

      /* نقشے کے کنٹینر کی سیٹنگ */
      .leaflet-container {
        width: 100%;
        height: 100%;
        background-color: #0a151b;
        border-radius: 20px; /* نقشے کے کونے گول کرنے کے لیے */
      }

      /* اسکرول بار کو خوبصورت بنانا (Optional) */
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: #000508;
      }
      ::-webkit-scrollbar-thumb {
        background: #00FF88;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
