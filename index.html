<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlinGo | Super App</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="src/global.css">
    
    <style>
        :root { --neon: #39FF14; --dark: #000; --glass: rgba(255, 255, 255, 0.05); }
        
        body { background: var(--dark); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }

        /* Header & Logo */
        .navbar { display: flex; align-items: center; justify-content: space-between; padding: 15px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(57, 255, 20, 0.1); }
        .logo-wrapper { flex-grow: 1; text-align: center; cursor: pointer; }
        .app-logo { height: 40px; filter: drop-shadow(0 0 8px var(--neon)); transition: 0.3s; }
        .app-logo:active { transform: scale(0.9); }

        /* Map Container */
        #map-container { height: 250px; margin: 15px; border-radius: 25px; border: 1px solid var(--neon); box-shadow: 0 0 20px rgba(57, 255, 20, 0.2); overflow: hidden; z-index: 1; }

        /* Main Services Grid */
        .main-services { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 10px 15px; }
        .service-card { background: var(--glass); border: 1px solid rgba(57, 255, 20, 0.2); border-radius: 25px; padding: 25px 10px; text-align: center; transition: 0.3s; cursor: pointer; position: relative; overflow: hidden; }
        .service-card:hover { border-color: var(--neon); background: rgba(57, 255, 20, 0.05); }
        .service-card i { font-size: 2.5rem; display: block; margin-bottom: 10px; filter: drop-shadow(0 0 5px var(--neon)); }
        .service-card span { font-size: 0.9rem; font-weight: bold; letter-spacing: 1px; color: #fff; }

        /* Admin Panel Overlay */
        #admin-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; padding: 40px 20px; box-sizing: border-box; display: none; flex-direction: column; }
        .admin-stat-card { background: #111; padding: 20px; border-radius: 20px; margin-bottom: 15px; border-right: 5px solid red; }
        .admin-stat-card h4 { color: red; margin: 0; font-size: 0.7rem; text-transform: uppercase; }
        .admin-stat-card p { margin: 5px 0 0; font-size: 1.4rem; font-weight: bold; color: #fff; }

        /* Footer Navigation */
        .footer-nav { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .nav-btn { text-align: center; color: #666; font-size: 0.7rem; cursor: pointer; transition: 0.3s; }
        .nav-btn i { font-size: 1.5rem; display: block; margin-bottom: 2px; }
        .nav-btn.active { color: var(--neon); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="app-shell">
    <header class="navbar">
        <div class="menu-trigger" style="font-size: 1.5rem;">☰</div>
        <div class="logo-wrapper" onclick="adminTrigger()">
            <img src="assets/logo.png" alt="AlinGo" class="app-logo">
        </div>
        <div class="profile-icon" onclick="goToPath('src/screens/Profile.html')" style="cursor:pointer; font-size: 1.5rem;">👤</div>
    </header>

    <div id="map-container"></div>

    <div class="main-services">
        <div class="service-card" onclick="goToPath('src/screens/SelectRide.html')">
            <i>🚗</i>
            <span>GET A RIDE</span>
        </div>
        <div class="service-card" onclick="alert('Food Menu Coming Soon!')">
            <i>🍱</i>
            <span>ORDER FOOD</span>
        </div>
    </div>

    <section id="admin-panel">
        <h2 style="color:red; text-align:center; font-style: italic; margin-bottom: 30px;">SERVICE MONITOR</h2>
        <div class="admin-stat-card">
            <h4>LIVE RIDES</h4>
            <p>14 Vehicles Active</p>
        </div>
        <div class="admin-stat-card">
            <h4>FOOD ORDERS</h4>
            <p>06 Orders in Transit</p>
        </div>
        <div class="admin-stat-card">
            <h4>TOTAL REVENUE</h4>
            <p>Rs. 84,200.00</p>
        </div>
        <button onclick="toggleAdmin()" style="background:red; color:white; border:none; padding:15px; border-radius:15px; width:100%; font-weight:bold; margin-top:auto;">CLOSE MONITOR</button>
    </section>

    <footer class="footer-nav">
        <div class="nav-btn active" onclick="location.href='index.html'"><i>🏠</i><span>HOME</span></div>
        <div class="nav-btn" onclick="goToPath('src/screens/SelectRide.html')"><i>🚗</i><span>RIDES</span></div>
        <div class="nav-btn" onclick="alert('No active orders')"><i>📦</i><span>ORDERS</span></div>
        <div class="nav-btn" onclick="goToPath('src/screens/Profile.html')"><i>👤</i><span>PROFILE</span></div>
    </footer>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // Map Initialization
    var map = L.map('map-container', {zoomControl: false}).setView([30.1575, 71.5249], 14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // Dynamic Path Function for Vercel & Local
    function goToPath(target) {
        // اگر لوکل فائل ہے تو "./" اور ورسل کے لیے سادہ پاتھ
        const isLocal = window.location.hostname === "127.0.0.1" || window.location.hostname === "localhost";
        window.location.href = isLocal ? "/" + target : target;
    }

    // Secret Admin Trigger
    let logoClicks = 0;
    function adminTrigger() {
        logoClicks++;
        if (logoClicks === 5) {
            toggleAdmin();
            logoClicks = 0;
        }
        setTimeout(() => { logoClicks = 0; }, 3000);
    }

    function toggleAdmin() {
        const panel = document.getElementById('admin-panel');
        panel.style.display = (panel.style.display === 'flex') ? 'none' : 'flex';
    }
</script>

</body>
</html>
