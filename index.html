<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AlinGo | City Ride & Food</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --neon: #39FF14;
            --dark-card: #0f0f0f;
            --neon-glow: 0 0 10px rgba(57, 255, 20, 0.4);
            --sidebar-width: 280px;
        }

        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* --- Sidebar Styles --- */
        .sidebar {
            position: fixed;
            top: 0;
            left: calc(-1 * var(--sidebar-width)); /* Hidden by default */
            width: var(--sidebar-width);
            height: 100%;
            background: #000;
            z-index: 2000;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid var(--neon);
            box-shadow: 10px 0 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar-header {
            padding: 40px 20px 20px;
            background: linear-gradient(to bottom, rgba(57, 255, 20, 0.1), transparent);
            border-bottom: 1px solid #222;
        }

        .user-profile-mini {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--neon);
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .menu-links {
            padding: 20px 0;
            flex-grow: 1;
        }

        .menu-link {
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: #ccc;
            text-decoration: none;
            font-size: 16px;
            transition: 0.3s;
        }

        .menu-link:hover {
            background: rgba(57, 255, 20, 0.05);
            color: var(--neon);
        }

        .menu-link i { font-size: 20px; }

        .sidebar-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1999;
            display: none;
            backdrop-filter: blur(3px);
        }

        /* --- Rest of your original styles --- */
        .lightning-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(57, 255, 20, 0.05) 0%, transparent 80%);
            z-index: -1;
        }

        .navbar {
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .menu-btn { font-size: 28px; color: var(--neon); cursor: pointer; padding: 5px; }

        #map-container {
            height: 38vh;
            width: 90%;
            margin: 10px auto;
            border: 2px solid var(--neon);
            border-radius: 20px;
            box-shadow: var(--neon-glow);
            overflow: hidden;
        }

        .main-services {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 15px;
            margin-bottom: 80px;
        }

        .service-card {
            background: var(--dark-card);
            border: 1.5px solid rgba(57, 255, 20, 0.2);
            border-radius: 20px;
            padding: 20px 10px;
            text-align: center;
            box-shadow: var(--neon-glow);
            transition: 0.3s;
        }

        .service-card:active { transform: scale(0.95); border-color: var(--neon); }
        .service-card img { width: 45px; height: auto; margin-bottom: 10px; }
        .service-card span { display: block; font-weight: bold; font-size: 12px; letter-spacing: 1px; }

        .footer-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid var(--neon);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .nav-item { text-align: center; color: #888; font-size: 10px; flex: 1; text-decoration: none; }
        .nav-item.active { color: var(--neon); }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 2px; }

        .install-pwa {
            background: var(--neon); color: #000; border: none;
            padding: 8px 15px; border-radius: 20px;
            font-weight: bold; font-size: 11px;
            box-shadow: 0 0 15px var(--neon);
            margin: 5px auto; display: block;
        }
    </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="user-profile-mini">
            <div class="user-avatar">👤</div>
            <div>
                <div style="font-weight: bold; font-size: 18px;">Welcome!</div>
                <div style="color: var(--neon); font-size: 12px;">AlinGo Rider</div>
            </div>
        </div>
    </div>
    
    <div class="menu-links">
        <a href="src/screens/Profile.html" class="menu-link"><span>👤</span> Profile</a>
        <a href="#" class="menu-link" onclick="alert('No History yet')"><span>🕒</span> Ride History</a>
        <a href="#" class="menu-link"><span>💳</span> Payments</a>
        <a href="#" class="menu-link"><span>📢</span> Promotions</a>
        <a href="#" class="menu-link"><span>⚙️</span> Settings</a>
        <a href="#" class="menu-link"><span>🎧</span> Support</a>
    </div>

    <div style="padding: 20px; border-top: 1px solid #222;">
        <a href="#" style="color: #ff4444; text-decoration: none; font-size: 14px;">Log Out</a>
    </div>
</nav>

<div class="lightning-bg"></div>

<header class="navbar">
    <div class="menu-btn" onclick="toggleSidebar()">☰</div>
    <img src="assets/logo.png" alt="AlinGo" style="height: 35px;">
    <div style="width: 32px;"></div> </header>

<div id="map-container"></div>

<button class="install-pwa" id="installApp" style="display:none;">INSTALL ALINGO</button>

<div class="main-services">
    <div class="service-card" onclick="location.href='src/screens/SelectRide.html'">
        <img src="https://cdn-icons-png.flaticon.com/512/744/744465.png" alt="Ride">
        <span>CITY RIDE</span>
    </div>
    <div class="service-card" onclick="alert('Coming Soon')">
        <img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png" alt="Food">
        <span>FOOD</span>
    </div>
    <div class="service-card" onclick="alert('Coming Soon')">
        <img src="https://cdn-icons-png.flaticon.com/512/2311/2311514.png" alt="Courier">
        <span>COURIER</span>
    </div>
    <div class="service-card" onclick="location.href='src/screens/Profile.html'">
        <img src="https://cdn-icons-png.flaticon.com/512/633/633611.png" alt="Wallet">
        <span>WALLET</span>
    </div>
</div>

<nav class="footer-nav">
    <a href="index.html" class="nav-item active">
        <span class="nav-icon">🏠</span>Home
    </a>
    <a href="src/screens/SelectRide.html" class="nav-item">
        <span class="nav-icon">🚗</span>Rides
    </a>
    <div class="nav-item" onclick="alert('No Orders')">
        <span class="nav-icon">📦</span>Orders
    </div>
    <a href="src/screens/Profile.html" class="nav-item">
        <span class="nav-icon">👤</span>Account
    </a>
</nav>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Sidebar Toggle Function
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        
        if (sidebar.classList.contains('active')) {
            sidebar.classList.remove('active');
            overlay.style.display = 'none';
        } else {
            sidebar.classList.add('active');
            overlay.style.display = 'block';
        }
    }

    // Map Initialization
    var map = L.map('map-container', {zoomControl: false}).setView([30.1575, 71.5249], 14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    // Install App Feature
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installApp').style.display = 'block';
    });

    document.getElementById('installApp').addEventListener('click', () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choice) => {
                if (choice.outcome === 'accepted') document.getElementById('installApp').style.display = 'none';
            });
        }
    });
</script>

</body>
</html>
